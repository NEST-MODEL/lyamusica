<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE BUNKER V3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js\"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js\"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js\"></script>

<style>
  :root {
    --bg-main: #0a0b0e;
    --bg-dark: #101216;
    --glass-bg: rgba(20, 22, 28, 0.65);
    --glass-border: rgba(255, 255, 255, 0.04);
    --glass-highlight: rgba(255, 255, 255, 0.08);
    
    --orange-pure: #ff5500;
    --orange-dim: #b33c00;
    --orange-glow: rgba(255, 85, 0, 0.15);
    --orange-laser: rgba(255, 85, 0, 0.4);
    
    --text-primary: #e2e8f0;
    --text-muted: #64748b;
    --text-dark: #0f172a;
    
    --font-ui: 'Share Tech Mono', monospace;
    --font-logo: 'Orbitron', sans-serif;
    --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: var(--bg-main);
    background-image: 
      linear-gradient(rgba(0, 0, 0, 0.4) 50%, transparent 50%),
      radial-gradient(circle at 50% 50%, transparent 30%, var(--bg-main) 90%);
    background-size: 100% 4px, 100% 100%;
    color: var(--text-primary);
    font-family: var(--font-ui);
    letter-spacing: 0.5px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 20px;
  }

  /* Эффект шума старого терминала поверх игры */
  body::before {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 99999;
    opacity: 0.4;
    pointer-events: none;
    background-size: 100% 3px, 6px 100%;
  }

  /* Плавная анимация проявления экранов */
  .screen {
    display: none;
    width: 100%;
    max-width: 900px;
    background: var(--glass-bg);
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    border: 1px solid var(--glass-border);
    border-top: 1px solid var(--glass-highlight);
    border-left: 1px solid var(--glass-highlight);
    border-radius: 12px;
    padding: 35px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    transform: translateY(10px);
    opacity: 0;
    transition: var(--transition-smooth);
    position: relative;
  }

  .screen.active {
    display: block;
    animation: screenShow 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
  }

  @keyframes screenShow {
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  /* Игровые заголовки и брендинг */
  .menu-logo {
    font-family: var(--font-logo);
    font-weight: 900;
    font-size: 2.5rem;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 30px;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(255,255,255,0.1);
    position: relative;
  }

  .menu-logo span {
    color: var(--orange-pure);
    text-shadow: 0 0 15px var(--orange-laser);
  }

  h2, h3 {
    font-family: var(--font-logo);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
    color: var(--text-primary);
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 10px;
  }

  /* Кастомный футуристичный инпут */
  .input-group {
    position: relative;
    margin-bottom: 20px;
    width: 100%;
  }

  input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
    width: 100%;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--glass-border);
    border-radius: 6px;
    padding: 14px 16px;
    font-family: var(--font-ui);
    font-size: 1.1rem;
    color: var(--text-primary);
    transition: var(--transition-smooth);
    outline: none;
  }

  input:focus {
    border-color: var(--orange-laser);
    box-shadow: 0 0 15px var(--orange-glow), inset 0 0 8px rgba(0,0,0,0.6);
    background: rgba(0, 0, 0, 0.6);
  }

  input::placeholder {
    color: var(--text-muted);
  }

  /* Военно-промышленные кнопки */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    background: linear-gradient(180deg, rgba(40,44,52,0.8) 0%, rgba(20,22,26,0.9) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom: 2px solid rgba(0,0,0,0.4);
    border-radius: 6px;
    padding: 14px 24px;
    font-family: var(--font-logo);
    font-size: 0.95rem;
    font-weight: 800;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: var(--transition-smooth);
    position: relative;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .btn:hover {
    background: linear-gradient(180deg, rgba(50,55,65,0.9) 0%, rgba(30,33,40,0.95) 100%);
    border-color: rgba(255,255,255,0.15);
    color: #fff;
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(1px);
    border-bottom-width: 1px;
  }

  /* Главная акцентная кнопка (Оранжевая) */
  .btn-primary {
    background: linear-gradient(180deg, var(--orange-pure) 0%, var(--orange-dim) 100%);
    border: 1px solid rgba(255,255,255,0.2);
    border-bottom: 3px solid rgba(0,0,0,0.5);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    box-shadow: 0 4px 15px rgba(255, 85, 0, 0.2);
  }

  .btn-primary:hover {
    background: linear-gradient(180deg, #ff661a 0%, #cc4400 100%);
    box-shadow: 0 6px 20px rgba(255, 85, 0, 0.4);
  }

  .btn-danger {
    background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 4px 15px rgba(220, 38, 38, 0.2);
  }
  .btn-danger:hover {
    background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%);
    box-shadow: 0 6px 20px rgba(220, 38, 38, 0.4);
  }

  /* Сетка комнат и лобби */
  .grid-layout {
    display: grid;
    grid-template-columns: 1.2fr 2fr;
    gap: 25px;
    margin-top: 20px;
  }

  @media (max-width: 768px) {
    .grid-layout {
      grid-template-columns: 1fr;
    }
  }

  /* Игровые панели (Glassmorphism контейнеры) */
  .panel {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 20px;
    height: 100%;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
  }

  /* Игровые карточки пользователей/характеристик */
  .card-item {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--glass-border);
    border-left: 3px solid var(--text-muted);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: var(--transition-smooth);
  }

  .card-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-left-color: var(--orange-pure);
    transform: translateX(3px);
  }

  .card-item.active-user {
    border-left-color: var(--orange-pure);
    background: rgba(255, 85, 0, 0.04);
  }

  .card-item.kicked {
    border-left-color: #ef4444;
    opacity: 0.5;
    text-decoration: line-through;
  }

  /* Кастомные бейджи статусов */
  .badge {
    font-size: 0.8rem;
    padding: 4px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    font-weight: bold;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .badge-orange {
    background: var(--orange-glow);
    border-color: var(--orange-laser);
    color: var(--orange-pure);
  }

  /* Элементы игровой статистики наверху панели */
  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    padding: 15px 20px;
    margin-bottom: 25px;
  }

  .stat-block {
    display: flex;
    flex-direction: column;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 1.4rem;
    font-weight: bold;
    color: var(--orange-pure);
    font-family: var(--font-logo);
  }

  /* Стилизация выпадающих списков и чекбоксов */
  select {
    width: 100%;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--glass-border);
    border-radius: 6px;
    padding: 12px;
    font-family: var(--font-ui);
    color: var(--text-primary);
    outline: none;
    cursor: pointer;
    margin-bottom: 15px;
  }

  select option {
    background: var(--bg-dark);
    color: var(--text-primary);
  }

  /* Игровой чат / лог действий */
  .log-container {
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid var(--glass-border);
    border-radius: 6px;
    height: 180px;
    overflow-y: auto;
    padding: 12px;
    font-size: 0.95rem;
    color: #cbd5e1;
    margin-bottom: 15px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  }

  .log-msg {
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    padding-bottom: 4px;
    animation: fadeIn 0.2s ease;
  }

  .log-system { color: var(--orange-pure); font-weight: bold; }
  .log-vote { color: #38bdf8; }
  .log-danger { color: #f87171; }

  /* Скроллбар терминала */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.2);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--orange-laser);
  }

  /* Скрытые элементы по логике */
  .hidden { display: none !important; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="screen-auth" class="screen active">
  <div class="menu-logo">THE <span>BUNKER</span> V3</div>
  <h2>Авторизация Терминала</h2>
  <div class="input-group">
    <input type="email" id="auth-email" placeholder="Идентификатор (Email)">
  </div>
  <div class="input-group">
    <input type="password" id="auth-password" placeholder="Ключ Доступа (Пароль)">
  </div>
  <button class="btn btn-primary" id="btn-login">Войти в сеть</button>
  <button class="btn" id="btn-register">Создать новый профиль</button>
</div>

<div id="screen-menu" class="screen">
  <div class="game-header">
    <div class="stat-block">
      <span class="stat-label">Оператор</span>
      <span id="menu-username" class="stat-value">Загрузка...</span>
    </div>
    <div class="stat-block" style="text-align: right;">
      <span class="stat-label">Баланс</span>
      <span id="menu-coins" class="stat-value">0 CC</span>
    </div>
  </div>
  
  <h2>Командный Центр</h2>
  <button class="btn btn-primary" id="btn-to-create">Инициировать Создание Убежища</button>
  <button class="btn" id="btn-to-join">Подключиться к Существующему Шлюзу</button>
  <button class="btn btn-danger" id="btn-logout">Отключить Терминал</button>
</div>

<div id="screen-create" class="screen">
  <h2>Параметры Нового Убежища</h2>
  <div class="input-group">
    <label class="stat-label" style="display:block; margin-bottom:8px;">Имя Смотрителя Бункера</label>
    <input type="text" id="create-name" placeholder="Введите ваш позывной">
  </div>
  <div class="input-group">
    <label class="stat-label" style="display:block; margin-bottom:8px;">Лимит Выживших в Бункере</label>
    <input type="number" id="create-limit" value="5" min="2" max="20">
  </div>
  <button class="btn btn-primary" id="btn-do-create">Запустить Протокол</button>
  <button class="btn" id="btn-back-create">Вернуться в Главное Меню</button>
</div>

<div id="screen-join" class="screen">
  <h2>Синхронизация Шлюза</h2>
  <div class="input-group">
    <input type="text" id="join-name" placeholder="Ваш позывной">
  </div>
  <div class="input-group">
    <input type="text" id="join-peerid" placeholder="ID Шлюза (Peer ID)">
  </div>
  <button class="btn btn-primary" id="btn-do-join">Установить Соединение</button>
  <button class="btn" id="btn-back-join">Отмена</button>
</div>

<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="stat-block">
      <span class="stat-label">Локальный Терминал</span>
      <span id="game-my-name" class="stat-value" style="color:#fff; font-size:1.1rem;">-</span>
    </div>
    <div class="stat-block" style="text-align: center;">
      <span class="stat-label">Статус Шлюза</span>
      <span id="game-status-badge" class="badge badge-orange">Ожидание игроков</span>
    </div>
    <div class="stat-block" style="text-align: right;">
      <span class="stat-label">Квота Выживания</span>
      <span id="game-quota-info" class="stat-value">- / -</span>
    </div>
  </div>

  <div style="margin-bottom: 15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:6px; border:1px solid var(--glass-border); font-size:0.9rem;">
    <span class="stat-label">Адрес Подключения:</span> 
    <span id="game-room-id" style="color:var(--orange-pure); font-weight:bold; word-break:break-all; margin-left:5px;">-</span>
  </div>

  <div class="grid-layout">
    <div>
      <div class="panel">
        <h3>Панель Контроля</h3>
        
        <div id="host-controls" class="hidden">
          <button class="btn btn-primary" id="btn-start-game">Заблокировать Шлюзы (Старт)</button>
        </div>

        <div id="vote-controls" class="hidden" style="margin-top:10px;">
          <label class="stat-label" style="display:block; margin-bottom:5px;">Протокол Исключения</label>
          <select id="vote-select"></select>
          <button class="btn btn-danger" id="btn-cast-vote">Инициировать Сброс</button>
        </div>

        <div style="margin-top: 20px;">
          <label class="stat-label">Журнал Событий</label>
          <div id="game-log" class="log-container"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel">
        <h3>Сектор Мониторинга Живых Систем</h3>
        <div id="players-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
///////////////////////////////////////////////////////////////////////////////
// ИНИЦИАЛИЗАЦИЯ И СЕРВИСНАЯ ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ)
///////////////////////////////////////////////////////////////////////////////
const firebaseConfig = {
  databaseURL: "https://bunker-v3-default-rtdb.europe-west1.firebasedatabase.app/"
};
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null; 
let peer = null;
let connToHost = null; 
let connections = []; 
let isHost = false;

let myName = "";
let myEmailClean = "none";
let maxSurvivors = 5; 

let players = []; 
let gameStarted = false;

// Характеристики
const professions = ["Инженер", "Врач", "Военный", "Ученый", "Повар", "Агроном", "Электрик", "Программист", "Химик", "Слесарь"];
const healthStates = ["Идеальное здоровье", "Легкое недомогание", "Хроническая астма", "Слабое сердце", "Перелом ноги", "Контузия", "Аллергия на пыль", "Анемия"];
const baggageItems = ["Набор инструментов", "Аптечка первой помощи", "Армейский нож", "Запас консерв", "Фонарик на солнечных батареях", "Два респиратора", "Рация", "Книга по выживанию"];
const phobias = ["Клаустрофобия (боязнь замкнутых пространств)", "Ахлуофобия (боязнь темноты)", "Мизофобия (боязнь микробов)", "Танатофобия (боязнь смерти)", "Гемофобия (боязнь крови)", "Нет фобий"];

function getRandomElement(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}
function generateBio() {
  return {
    prof: getRandomElement(professions),
    health: getRandomElement(healthStates),
    bag: getRandomElement(baggageItems),
    phobia: getRandomElement(phobias),
    age: Math.floor(Math.random() * 50) + 18
  };
}

function switchScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(screenId);
  if(target) target.classList.add('active');
}

///////////////////////////////////////////////////////////////////////////////
// АВТОРИЗАЦИЯ И МЕНЮ
///////////////////////////////////////////////////////////////////////////////
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    myEmailClean = user.email.replace(/\./g, ',');
    switchScreen('screen-menu');
    loadUserData();
  } else {
    currentUser = null;
    myEmailClean = "none";
    switchScreen('screen-auth');
  }
});

function loadUserData() {
  if(!currentUser) return;
  document.getElementById('menu-username').innerText = currentUser.email;
  db.ref('users/' + myEmailClean).on('value', snapshot => {
    let data = snapshot.val();
    if(data) {
      document.getElementById('menu-coins').innerText = (data.coins || 0) + " CC";
    } else {
      db.ref('users/' + myEmailClean).set({ coins: 0 });
      document.getElementById('menu-coins').innerText = "0 CC";
    }
  });
}

document.getElementById('btn-login').addEventListener('click', () => {
  let email = document.getElementById('auth-email').value.trim();
  let pass = document.getElementById('auth-password').value.trim();
  if(!email || !pass) return alert("Заполните поля термнала!");
  auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Ошибка доступа: " + e.message));
});

document.getElementById('btn-register').addEventListener('click', () => {
  let email = document.getElementById('auth-email').value.trim();
  let pass = document.getElementById('auth-password').value.trim();
  if(!email || !pass) return alert("Заполните поля терминала!");
  auth.createUserWithEmailAndPassword(email, pass).catch(e => alert("Ошибка регистрации: " + e.message));
});

document.getElementById('btn-logout').addEventListener('click', () => {
  auth.signOut();
});

document.getElementById('btn-to-create').addEventListener('click', () => switchScreen('screen-create'));
document.getElementById('btn-to-join').addEventListener('click', () => switchScreen('screen-join'));
document.getElementById('btn-back-create').addEventListener('click', () => switchScreen('screen-menu'));
document.getElementById('btn-back-join').addEventListener('click', () => switchScreen('screen-menu'));

///////////////////////////////////////////////////////////////////////////////
// ХОСТ: СОЗДАНИЕ УБЕЖИЩА
///////////////////////////////////////////////////////////////////////////////
document.getElementById('btn-do-create').addEventListener('click', () => {
  let nameInput = document.getElementById('create-name').value.trim();
  let limitInput = parseInt(document.getElementById('create-limit').value);
  if(!nameInput) return alert("Укажите позывной Смотрителя!");
  if(isNaN(limitInput) || limitInput < 2) limitInput = 5;

  myName = nameInput;
  maxSurvivors = limitInput;
  isHost = true;
  gameStarted = false;
  players = [];

  peer = new Peer();
  peer.on('open', (id) => {
    switchScreen('screen-game');
    document.getElementById('game-my-name').innerText = myName + " (Смотритель)";
    document.getElementById('game-room-id').innerText = id;
    document.getElementById('host-controls').classList.remove('hidden');
    document.getElementById('vote-controls').classList.add('hidden');
    
    document.getElementById('game-status-badge').className = "badge badge-orange";
    document.getElementById('game-status-badge').innerText = "Сбор отряда";
    updateQuotaUI();

    let myBio = generateBio();
    players.push({
      peerId: id,
      name: myName,
      emailClean: myEmailClean,
      bio: myBio,
      votesReceived: 0,
      kicked: false
    });
    logMessage(`Бункер инициализирован. Ожидайте выживших.`, 'system');
    renderPlayers();
  });

  peer.on('connection', (conn) => {
    if(gameStarted) {
      conn.on('open', () => {
        conn.send({ type: 'error', msg: "Шлюзы бункера уже заблокированы (игра началась)!" });
        setTimeout(() => conn.close(), 500);
      });
      return;
    }
    connections.push(conn);
    setupHostHandlers(conn);
  });
});

function setupHostHandlers(conn) {
  conn.on('data', (data) => {
    if(data.type === 'join') {
      players.push({
        peerId: conn.peer,
        name: data.name,
        emailClean: data.emailClean,
        bio: data.bio,
        votesReceived: 0,
        kicked: false
      });
      logMessage(`Система обнаружила выжившего: ${data.name}`, 'system');
      broadcast({ type: 'sync', players: players, maxSurvivors: maxSurvivors, gameStarted: gameStarted });
      renderPlayers();
    }
    if(data.type === 'vote') {
      if(!gameStarted) return;
      let target = players.find(p => p.peerId === data.targetPeerId && !p.kicked);
      if(target) {
        target.votesReceived++;
        logMessage(`Получен голос против модуля жизнеобеспечения игрока с ID ${data.targetPeerId}`, 'vote');
        checkVoteConclusion();
      }
    }
  });

  conn.on('close', () => {
    connections = connections.filter(c => c.peer !== conn.peer);
    let pIdx = players.findIndex(p => p.peerId === conn.peer);
    if(pIdx !== -1) {
      logMessage(`Потеряна связь с выжившим: ${players[pIdx].name}`, 'danger');
      if(!gameStarted) {
        players.splice(pIdx, 1);
      } else {
        players[pIdx].kicked = true; 
      }
      broadcast({ type: 'sync', players: players, maxSurvivors: maxSurvivors, gameStarted: gameStarted });
      renderPlayers();
      if(gameStarted) checkVoteConclusion();
    }
  });
}

function broadcast(msg) {
  connections.forEach(c => {
    if(c.open) c.send(msg);
  });
}

///////////////////////////////////////////////////////////////////////////////
// КЛИЕНТ: ПОДКЛЮЧЕНИЕ К ШЛЮЗУ
///////////////////////////////////////////////////////////////////////////////
document.getElementById('btn-do-join').addEventListener('click', () => {
  let nameInput = document.getElementById('join-name').value.trim();
  let hostId = document.getElementById('join-peerid').value.trim();
  if(!nameInput || !hostId) return alert("Заполните позывной и ID Шлюза!");

  myName = nameInput;
  isHost = false;
  gameStarted = false;

  peer = new Peer();
  peer.on('open', (id) => {
    connToHost = peer.connect(hostId);
    connToHost.on('open', () => {
      switchScreen('screen-game');
      document.getElementById('game-my-name').innerText = myName;
      document.getElementById('game-room-id').innerText = hostId;
      document.getElementById('host-controls').classList.add('hidden');
      
      let myBio = generateBio();
      connToHost.send({ type: 'join', name: myName, emailClean: myEmailClean, bio: myBio });
    });

    connToHost.on('data', (data) => {
      if(data.type === 'error') {
        alert(data.msg);
        peer.destroy();
        switchScreen('screen-menu');
      }
      if(data.type === 'sync') {
        players = data.players;
        maxSurvivors = data.maxSurvivors;
        gameStarted = data.gameStarted;
        
        let me = players.find(p => p.peerId === peer.id);
        if(me && me.kicked) {
          showGameOver("Вы были исключены из бункера решением большинства!");
          peer.destroy();
          return;
        }

        if(gameStarted) {
          document.getElementById('game-status-badge').className = "badge badge-orange";
          document.getElementById('game-status-badge').innerText = "Голосование / Финал";
          document.getElementById('vote-controls').classList.remove('hidden');
        } else {
          document.getElementById('game-status-badge').className = "badge";
          document.getElementById('game-status-badge').innerText = "Сбор отряда";
          document.getElementById('vote-controls').classList.add('hidden');
        }
        updateQuotaUI();
        renderPlayers();
      }
      if(data.type === 'log') {
        logMessage(data.msg, data.styleClass);
      }
      if(data.type === 'game-end') {
        showGameOver(data.msg);
        peer.destroy();
      }
    });

    connToHost.on('close', () => {
      alert("Связь со Смотрителем Бункера разорвана.");
      switchScreen('screen-menu');
    });
  });
});

///////////////////////////////////////////////////////////////////////////////
// ИГРОВАЯ ЛОГИКА И ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
///////////////////////////////////////////////////////////////////////////////
function logMessage(text, styleClass = '') {
  let logBox = document.getElementById('game-log');
  let div = document.createElement('div');
  div.className = 'log-msg';
  if(styleClass === 'system') div.innerHTML = `<span class="log-system">[СИСТЕМА]</span> ${text}`;
  else if(styleClass === 'vote') div.innerHTML = `<span class="log-vote">[ПРОТОКОЛ]</span> ${text}`;
  else if(styleClass === 'danger') div.innerHTML = `<span class="log-danger">[ТРЕВОГА]</span> ${text}`;
  else div.innerText = text;
  
  logBox.appendChild(div);
  logBox.scrollTop = logBox.scrollHeight;

  if(isHost) {
    broadcast({ type: 'log', msg: text, styleClass: styleClass });
  }
}

function updateQuotaUI() {
  let activePlayers = players.filter(p => !p.kicked).length;
  document.getElementById('game-quota-info').innerText = `${activePlayers} / ${maxSurvivors}`;
}

function renderPlayers() {
  let listContainer = document.getElementById('players-list');
  listContainer.innerHTML = "";

  let voteSelect = document.getElementById('vote-select');
  voteSelect.innerHTML = "";

  players.forEach(p => {
    let isMe = (p.peerId === (peer ? peer.id : ''));
    
    // Создаем карточку игрока в новом стиле игровых панелей
    let card = document.createElement('div');
    card.className = `card-item ${isMe ? 'active-user' : ''} ${p.kicked ? 'kicked' : ''}`;
    
    let content = `
      <div>
        <strong style="font-size:1.1rem; color:#fff;">${p.name}</strong> 
        <span style="font-size:0.85rem; color:var(--text-muted); margin-left:8px;">(Возраст: ${p.bio.age})</span>
        <div style="margin-top:6px; font-size:0.95rem; color:var(--text-primary);">
          • Профессия: <span style="color:var(--orange-pure);">${p.bio.prof}</span><br>
          • Здоровье: ${p.bio.health}<br>
          • Багаж: ${p.bio.bag}<br>
          • Фобия: <span style="color:#94a3b8; font-style:italic;">${p.bio.phobia}</span>
        </div>
      </div>
    `;
    
    if(gameStarted && !p.kicked) {
      content += `<div class="badge badge-orange">Голосов: ${p.votesReceived}</div>`;
    } else if(p.kicked) {
      content += `<div class="badge" style="background:#7f1d1d; color:#f87171;">Эвакуирован</div>`;
    } else {
      content += `<div class="badge">Готов</div>`;
    }

    card.innerHTML = content;
    listContainer.appendChild(card);

    // Заполнение селектора голосования
    if(gameStarted && !p.kicked && !isMe) {
      let opt = document.createElement('option');
      opt.value = p.peerId;
      opt.innerText = p.name;
      voteSelect.appendChild(opt);
    }
  });
}

// Запуск игры хостом
document.getElementById('btn-start-game').addEventListener('click', () => {
  if(!isHost) return;
  if(players.length < 2) {
    alert("Для запуска симуляции в бункере должно быть минимум 2 выживших!");
    return;
  }
  gameStarted = true;
  document.getElementById('host-controls').classList.add('hidden');
  document.getElementById('vote-controls').classList.remove('hidden');
  document.getElementById('game-status-badge').className = "badge badge-orange";
  document.getElementById('game-status-badge').innerText = "Голосование / Финал";
  
  logMessage("Шлюзы запечатаны. Ресурсы ограничены. Активирован протокол оптимизации численности.", 'danger');
  
  // Обнуляем голоса перед стартом раунда голосования
  players.forEach(p => p.votesReceived = 0);
  
  broadcast({ type: 'sync', players: players, maxSurvivors: maxSurvivors, gameStarted: gameStarted });
  renderPlayers();
  checkVoteConclusion(); // Сразу проверяем квоту выживания
});

// Клик по кнопке голосования (И хост, и клиент)
document.getElementById('btn-cast-vote').addEventListener('click', () => {
  let targetId = document.getElementById('vote-select').value;
  if(!targetId) return alert("Выберите цель для исключения!");

  if(isHost) {
    let target = players.find(p => p.peerId === targetId && !p.kicked);
    if(target) {
      target.votesReceived++;
      logMessage(`Смотритель проголосовал против ${target.name}`, 'vote');
      checkVoteConclusion();
    }
  } else {
    if(connToHost && connToHost.open) {
      connToHost.send({ type: 'vote', targetPeerId: targetId });
      logMessage("Ваш голос отправлен на главный терминал.", 'system');
    }
  }
  // Отключаем кнопку, чтобы нельзя было спамить голосами в одном раунде
  document.getElementById('btn-cast-vote').disabled = true;
  document.getElementById('btn-cast-vote').innerText = "Голос учтен";
});

function checkVoteConclusion() {
  if(!isHost) return;

  let activePlayers = players.filter(p => !p.kicked);
  let totalVotesCast = players.reduce((sum, p) => sum + p.votesReceived, 0);

  // Если проголосовали все живые участники
  if(totalVotesCast >= activePlayers.length) {
    // Находим того, у кого больше всего голосов
    let maxVotes = -1;
    let targetToKick = null;

    activePlayers.forEach(p => {
      if(p.votesReceived > maxVotes) {
        maxVotes = p.votesReceived;
        targetToKick = p;
      }
    });

    if(targetToKick && maxVotes > 0) {
      targetToKick.kicked = true;
      logMessage(`Большинством голосов выживший ${targetToKick.name} принудительно выдворен за пределы шлюза!`, 'danger');
    } else {
      logMessage("Голоса распределились поровну. Никто не покинул бункер в этом раунде.", 'system');
    }

    // Сбрасываем счетчики голосов для следующего этапа (если он понадобится)
    players.forEach(p => p.votesReceived = 0);
    
    // Проверяем условия завершения игры после исключения
    let remaining = players.filter(p => !p.kicked);
    if(remaining.length <= maxSurvivors) {
      // ИГРА ОКОНЧЕНА: Квота достигнута, выжившие получают коины!
      if(remaining.length < 2) {
        let msg = "Сессия завершена. Для начисления Кибер-Коинов в бункере должно быть минимум 2 игрока!";
        connections.forEach(c => c.open && c.send({ type: 'game-end', msg: msg }));
        showGameOver(msg);
        return;
      }

      remaining.forEach(p => {
        if(p.emailClean && p.emailClean !== 'none' && !p.kicked) {
          db.ref('users/' + p.emailClean + '/coins').transaction((current) => {
            return (current || 0) + 100;
          }).catch(e => console.log("Ошибка записи монет"));
        }
      });

      let msg = `Квота достигнута. Шлюзы заблокированы! Выжили: ` + remaining.map(p => p.name).join(', ') + `. Выжившим начислено +100 коинов!`;
      connections.forEach(c => c.open && c.send({ type: 'game-end', msg: msg }));
      showGameOver(msg);
      return;
    }

    // Если игра продолжается, рассылаем синхронизацию и возвращаем возможность голосовать
    broadcast({ type: 'sync', players: players, maxSurvivors: maxSurvivors, gameStarted: gameStarted });
    renderPlayers();
    updateQuotaUI();

    // Сброс состояния кнопки голосования у самого хоста
    document.getElementById('btn-cast-vote').disabled = false;
    document.getElementById('btn-cast-vote').innerText = "Инициировать Сброс";
  } else {
    // Если еще не все проголосовали, просто обновляем текущее состояние на экранах
    broadcast({ type: 'sync', players: players, maxSurvivors: maxSurvivors, gameStarted: gameStarted });
    renderPlayers();
  }
}

function showGameOver(msg) {
  document.body.innerHTML = `
    <div class="screen active" style="text-align:center; max-width:650px; margin:20px auto; padding: 35px;">
      <div class="menu-logo">СЕССИЯ <span>ЗАВЕРШЕНА</span></div>
      <p style="font-size: 1.2rem; color: var(--text-primary); margin-bottom: 30px; line-height: 1.6; border: 1px dashed var(--orange-laser); padding: 15px; background: rgba(0,0,0,0.3); border-radius: 6px;">
        ${msg}
      </p>
      <button class="btn btn-primary" onclick="window.location.reload()">Перезапустить терминал</button>
    </div>
  `;
}
</script>
