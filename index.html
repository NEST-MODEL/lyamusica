<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6 КОМНАТ // Испытание Смотрителя</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0810;
  --panel:#141019;
  --panel2:#1b1522;
  --border:#2c2434;
  --gold:#cda35e;
  --gold-dim:#8a7247;
  --violet:#8f6fff;
  --violet-dim:#4d3f8a;
  --blood:#b0392c;
  --blood-glow:rgba(176,57,44,.35);
  --text:#ece6da;
  --muted:#8d8698;
  --ok:#5fbfa0;
}
*{box-sizing:border-box;}
body{
  font-family:'Roboto Mono',monospace;
  background:
    radial-gradient(circle at 20% -10%, rgba(143,111,255,.10), transparent 40%),
    radial-gradient(circle at 90% 10%, rgba(205,163,94,.08), transparent 35%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
}
.font-display{font-family:'Cinzel',serif;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--panel);}
::-webkit-scrollbar-thumb{background:var(--border);}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}

.panel{background:var(--panel);border:1px solid var(--border);}
.panel2{background:var(--panel2);border:1px solid var(--border);}
.glow-gold{box-shadow:0 0 22px rgba(205,163,94,.12);}
.glow-violet{box-shadow:0 0 22px rgba(143,111,255,.15);}
.glow-blood{box-shadow:0 0 26px var(--blood-glow);}
.text-gold{color:var(--gold);}
.text-violet{color:var(--violet);}
.text-blood{color:var(--blood);}
.text-muted{color:var(--muted);}
.text-ok{color:var(--ok);}
.border-goldline{border-color:var(--gold-dim);}
.bg-gold{background:var(--gold);}
.bg-blood{background:var(--blood);}

.btn{
  font-family:'Roboto Mono',monospace;
  letter-spacing:.06em;
  transition:all .15s ease;
}
.btn:active{transform:scale(.97);}
.btn-gold{
  background:linear-gradient(180deg,#dcb972,#b98f45);
  color:#181108;
  font-weight:700;
}
.btn-gold:hover{background:linear-gradient(180deg,#e6c684,#c69a51);}
.btn-ghost{
  background:var(--panel2);
  border:1px solid var(--border);
  color:var(--text);
}
.btn-ghost:hover{border-color:var(--gold-dim);color:var(--gold);}
.btn-blood{
  background:linear-gradient(180deg,#c94d3d,#8f2c21);
  color:#fff0ea;
  font-weight:700;
}
.btn-blood:hover{background:linear-gradient(180deg,#d75c4b,#9e3327);}
.btn:disabled{opacity:.35;pointer-events:none;}

input[type=text]{
  background:#0e0b13;
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Roboto Mono',monospace;
}
input[type=text]:focus{outline:none;border-color:var(--gold-dim);}
input[type=text]::placeholder{color:#514a5c;}

@keyframes pulse-slow{0%,100%{opacity:.55;}50%{opacity:1;}}
.pulse-slow{animation:pulse-slow 2.6s ease-in-out infinite;}
@keyframes ember{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:1;transform:scale(1.06);}}
.ember{animation:ember 1.4s ease-in-out infinite;}
@keyframes irisTurn{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.iris-ring{animation:irisTurn 40s linear infinite;}
@keyframes riseIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.rise-in{animation:riseIn .35s ease-out;}
@keyframes flicker{0%,100%{opacity:1;}45%{opacity:.85;}50%{opacity:.4;}55%{opacity:.9;}}
.flicker{animation:flicker 6s ease-in-out infinite;}

.eyeSvg{filter:drop-shadow(0 0 10px rgba(205,163,94,.35));}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);}
</style>
</head>
<body class="min-h-screen">

<div id="app" class="min-h-screen flex flex-col"></div>

<script>
/* ============================================================
   6 КОМНАТ — многопользовательская игра
   Синхронизация между устройствами через window.storage (shared=true)
   ============================================================ */

const MAX_ROUNDS = 11;
const GUN_ROUND = 7;
const POLL_MS = 1300;

const CHALLENGES = [
  {title:"Испытание Доверия", desc:"Каждая комната тайно решает: разделить общий ресурс поровну или забрать его себе. Смотритель считает голоса без свидетелей."},
  {title:"Тьма", desc:"Свет в чертогах гаснет на мгновение. Кто первым отзовётся Смотрителю — получает его расположение."},
  {title:"Число Судьбы", desc:"Назовите Смотрителю число от 1 до 10. Чем ближе к загаданному — тем выше шанс на очко."},
  {title:"Печать Молчания", desc:"Три минуты линии связи будут заняты собой. Кто выдержит и не станет никому звонить — будет отмечен."},
  {title:"Жертва Ради Всех", desc:"Кто-то должен добровольно уступить своё будущее очко. Обсудите это — если осмелитесь сказать правду."},
  {title:"Зеркало Чертога", desc:"Скажите вслух в своей комнате, что вы думаете о соседней комнате. Никто не узнает, кто это сказал — кроме Смотрителя."},
  {title:"Испытание Голоса", desc:"Смотритель слушает переговоры по линиям связи. Убедительность в разговоре сама по себе не забыта."},
  {title:"Круг Шести", desc:"Коллективное решение: комнаты должны молча прийти к общему числу от 1 до 6. Совпадение будет вознаграждено."}
];

const HOST_LINES = {
  welcome: "Шесть комнат. Шесть незнакомцев. Один Смотритель. Не каждый увидит конец испытания.",
  lobbyWait: "Комнаты заполняются. Ожидайте моего сигнала.",
  challenge: (r,c)=>`Раунд ${r}. Испытание «${c.title}». ${c.desc}`,
  processing: "Молчите. Я взвешиваю каждый ваш поступок.",
  discussion: "Линии связи открыты. Говорите — если решитесь довериться друг другу.",
  gunIntro: (slot)=>`В Комнате №${slot} обнаружен клинок Смотрителя. Один удар решит многое.`,
  gunResolved: (shooter,target)=>`Комната №${shooter} сделала свой выбор. Комната №${target} покидает чертог.`,
  gunEmpty: "Клинок остался нетронутым. Чертог продолжает дышать.",
  ended: "Испытания окончены. Маски сняты. Вот то, что было скрыто от вас все это время."
};

/* ---------------- utilities ---------------- */
function genCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s="";
  for(let i=0;i<5;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function uid(){ return 'c'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function pairKey(a,b){ return a<b? `${a}-${b}` : `${b}-${a}`; }
function esc(str){
  return String(str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function timeStr(ts){
  return new Date(ts).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

/* ---------------- storage helpers ---------------- */
const STORAGE_AVAILABLE = (typeof window.storage !== 'undefined' && window.storage !== null);
let LAST_STORAGE_ERROR = null;

async function getGame(code){
  if(!STORAGE_AVAILABLE) return null;
  try{
    const res = await window.storage.get(`game:${code}`, true);
    return res ? JSON.parse(res.value) : null;
  }catch(e){
    LAST_STORAGE_ERROR = (e && e.message) ? e.message : String(e);
    return null;
  }
}
async function setGame(code, obj){
  if(!STORAGE_AVAILABLE) return false;
  obj.updatedAt = Date.now();
  try{
    await window.storage.set(`game:${code}`, JSON.stringify(obj), true);
    return true;
  }catch(e){
    LAST_STORAGE_ERROR = (e && e.message) ? e.message : String(e);
    console.error('storage set failed', e);
    return false;
  }
}
async function mutateGame(code, fn){
  const g = await getGame(code);
  if(!g) return null;
  fn(g);
  await setGame(code, g);
  return g;
}
function pushLog(g, text, type='system'){
  g.log = g.log || [];
  g.log.push({ts:Date.now(), text, type});
  if(g.log.length>60) g.log = g.log.slice(-60);
}

/* ---------------- app state ---------------- */
const S = {
  role:null,      // 'host' | 'player'
  code:null,
  mySlot:null,
  myName:null,
  clientId: uid(),
  pollTimer:null,
  game:null,
  renderedCallPartner:undefined,
  busyFlash:null,
};

const app = document.getElementById('app');

function stopPolling(){ if(S.pollTimer){ clearInterval(S.pollTimer); S.pollTimer=null; } }
function startPolling(){
  stopPolling();
  S.pollTimer = setInterval(async ()=>{
    const g = await getGame(S.code);
    if(!g) return;
    S.game = g;
    if(S.role==='host') renderHostDynamic();
    else if(S.role==='player') renderPlayerDynamic();
  }, POLL_MS);
}

/* ================================================================
   LANDING
   ================================================================ */
function renderLanding(){
  stopPolling();
  S.role=null; S.code=null; S.mySlot=null;
  app.innerHTML = `
  <div class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md rise-in">
      <div class="flex flex-col items-center mb-6">
        ${eyeSigil(64)}
        <h1 class="font-display text-4xl font-bold tracking-widest text-gold mt-4">6 КОМНАТ</h1>
        <p class="text-muted text-xs italic mt-1 tracking-wide">Испытание Смотрителя</p>
      </div>

      <div id="landing-body" class="panel rounded-xl p-5 glow-gold space-y-3">
        ${!STORAGE_AVAILABLE ? `<div class="text-[11px] text-blood border border-blood/40 rounded p-3 mb-2 leading-relaxed">⚠ Хранилище не обнаружено. Эта страница должна быть открыта как артефакт Claude (панель предпросмотра справа/внутри чата), а не как отдельно скачанный .html-файл или на другом хостинге — иначе комнаты не смогут находить друг друга.</div>` : ''}
        <button id="btn-show-create" class="btn btn-gold w-full py-3.5 rounded uppercase text-sm tracking-wider">Создать игру</button>
        <button id="btn-show-join" class="btn btn-ghost w-full py-3.5 rounded uppercase text-sm tracking-wider">Войти в комнату</button>
        <div class="divider my-2"></div>
        <button id="btn-show-reconnect" class="text-[11px] text-muted hover:text-gold transition-colors w-full text-center underline underline-offset-2">Восстановить прерванную сессию</button>
      </div>
      <p class="text-[10px] text-muted text-center mt-4 leading-relaxed">Игра синхронизируется через этот артефакт.<br>Друзья должны открыть ту же ссылку/артефакт на своих устройствах, а не скачивать файл.</p>
    </div>
  </div>`;
  document.getElementById('btn-show-create').onclick = showCreateForm;
  document.getElementById('btn-show-join').onclick = showJoinForm;
  document.getElementById('btn-show-reconnect').onclick = showReconnectForm;
}

function eyeSigil(size){
  return `
  <svg width="${size}" height="${size}" viewBox="0 0 100 100" class="eyeSvg">
    <g class="iris-ring" style="transform-origin:50px 50px;">
      <circle cx="50" cy="50" r="46" fill="none" stroke="var(--gold-dim)" stroke-width="1" stroke-dasharray="2 6"/>
    </g>
    <path d="M6 50 Q50 10 94 50 Q50 90 6 50 Z" fill="none" stroke="var(--gold)" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="16" fill="#0a0810" stroke="var(--violet)" stroke-width="2" class="pulse-slow"/>
    <circle cx="50" cy="50" r="6" fill="var(--gold)"/>
  </svg>`;
}

function showCreateForm(){
  const box = document.getElementById('landing-body');
  box.innerHTML = `
    <label class="block text-[11px] uppercase text-muted tracking-wider mb-1">Ваше имя (как Смотритель)</label>
    <input id="host-name" type="text" maxlength="18" placeholder="Смотритель" class="w-full rounded p-3 text-sm mb-3">
    <button id="btn-create" class="btn btn-gold w-full py-3 rounded uppercase text-sm tracking-wider">Открыть чертог</button>
    <button id="btn-back" class="text-[11px] text-muted hover:text-gold w-full text-center mt-3">← Назад</button>
  `;
  document.getElementById('btn-back').onclick = renderLanding;
  document.getElementById('btn-create').onclick = async ()=>{
    const name = document.getElementById('host-name').value.trim() || "Смотритель";
    const code = genCode();
    const doc = {
      code, createdAt: Date.now(),
      started:false, ended:false,
      phase:'lobby', round:0, maxRounds:MAX_ROUNDS,
      commsOpen:false,
      challenge:null,
      gunHolder:null,
      winnerSlot:null,
      hostName:name,
      hostSpeech: HOST_LINES.welcome,
      log:[{ts:Date.now(), text:"Чертог инициализирован. Ожидание испытуемых.", type:'system'}],
      players:[],
      chats:{}
    };
    const btn = document.getElementById('btn-create');
    btn.disabled = true; btn.textContent = 'Открываю...';
    const ok = await setGame(code, doc);
    const verify = ok ? await getGame(code) : null;
    if(!ok || !verify){
      btn.disabled = false; btn.textContent = 'Открыть чертог';
      showStorageError(box);
      return;
    }
    S.role='host'; S.code=code; S.game=verify;
    renderHostShell();
    startPolling();
  };
}

function showStorageError(box){
  const errDiv = document.createElement('div');
  errDiv.className = 'text-[11px] text-blood mt-3 leading-relaxed border-t border-goldline pt-3';
  errDiv.innerHTML = !STORAGE_AVAILABLE
    ? `Хранилище недоступно в этом окне. Игра должна быть открыта именно как артефакт Claude (в панели предпросмотра), а не как скачанный файл, открытый отдельно в браузере, или на другом сайте.`
    : `Не удалось сохранить игру. Техническая причина: ${esc(LAST_STORAGE_ERROR||'неизвестна')}. Попробуйте ещё раз.`;
  box.appendChild(errDiv);
}

function showJoinForm(){
  const box = document.getElementById('landing-body');
  box.innerHTML = `
    <label class="block text-[11px] uppercase text-muted tracking-wider mb-1">Код чертога</label>
    <input id="join-code" type="text" maxlength="5" placeholder="XXXXX" class="w-full rounded p-3 text-sm mb-3 uppercase tracking-widest text-center font-bold">
    <label class="block text-[11px] uppercase text-muted tracking-wider mb-1">Ваше имя</label>
    <input id="join-name" type="text" maxlength="18" placeholder="Безымянный" class="w-full rounded p-3 text-sm mb-3">
    <div id="join-error" class="text-[11px] text-blood mb-2 hidden"></div>
    <button id="btn-join" class="btn btn-gold w-full py-3 rounded uppercase text-sm tracking-wider">Войти в чертог</button>
    <button id="btn-back" class="text-[11px] text-muted hover:text-gold w-full text-center mt-3">← Назад</button>
  `;
  document.getElementById('btn-back').onclick = renderLanding;
  document.getElementById('join-code').addEventListener('input', e=>{ e.target.value = e.target.value.toUpperCase(); });
  document.getElementById('btn-join').onclick = async ()=>{
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    const name = document.getElementById('join-name').value.trim() || "Безымянный";
    const errBox = document.getElementById('join-error');
    errBox.classList.add('hidden');
    if(!code){ errBox.textContent="Введите код."; errBox.classList.remove('hidden'); return; }
    if(!STORAGE_AVAILABLE){
      errBox.innerHTML = "Хранилище недоступно в этом окне. Откройте игру именно как артефакт Claude (панель предпросмотра), а не как отдельно скачанный файл.";
      errBox.classList.remove('hidden'); return;
    }
    const g = await getGame(code);
    if(!g){
      errBox.textContent = STORAGE_AVAILABLE
        ? "Чертог с таким кодом не найден. Проверьте код у того, кто создал игру — код должен совпадать точно, и создатель должен оставаться в том же артефакте."
        : "Хранилище недоступно.";
      errBox.classList.remove('hidden'); return;
    }
    if(g.phase!=='lobby'){ errBox.textContent="Испытание уже началось. Вход закрыт."; errBox.classList.remove('hidden'); return; }
    if(g.players.length>=6){ errBox.textContent="Все шесть комнат заняты."; errBox.classList.remove('hidden'); return; }
    const slot = g.players.length+1;
    g.players.push({slot, name, clientId:S.clientId, alive:true, score:0, inCallWith:null});
    pushLog(g, `Комната №${slot} подключена к чертогу.`, 'system');
    await setGame(code, g);
    S.role='player'; S.code=code; S.mySlot=slot; S.myName=name; S.game=g;
    renderPlayerShell();
    startPolling();
  };
}

function showReconnectForm(){
  const box = document.getElementById('landing-body');
  box.innerHTML = `
    <p class="text-[11px] text-muted mb-3 leading-relaxed">Если ваша страница обновилась и связь с комнатой прервалась — введите код чертога и номер вашей комнаты, чтобы вернуться.</p>
    <label class="block text-[11px] uppercase text-muted tracking-wider mb-1">Код чертога</label>
    <input id="rc-code" type="text" maxlength="5" placeholder="XXXXX" class="w-full rounded p-3 text-sm mb-3 uppercase tracking-widest text-center font-bold">
    <label class="block text-[11px] uppercase text-muted tracking-wider mb-1">Номер вашей комнаты (1–6)</label>
    <input id="rc-slot" type="text" maxlength="1" placeholder="1" class="w-full rounded p-3 text-sm mb-3 text-center">
    <div id="rc-error" class="text-[11px] text-blood mb-2 hidden"></div>
    <button id="btn-rc" class="btn btn-ghost w-full py-3 rounded uppercase text-sm tracking-wider">Восстановить</button>
    <button id="btn-back" class="text-[11px] text-muted hover:text-gold w-full text-center mt-3">← Назад</button>
  `;
  document.getElementById('btn-back').onclick = renderLanding;
  document.getElementById('btn-rc').onclick = async ()=>{
    const code = document.getElementById('rc-code').value.trim().toUpperCase();
    const slot = parseInt(document.getElementById('rc-slot').value.trim(),10);
    const errBox = document.getElementById('rc-error');
    errBox.classList.add('hidden');
    const g = await getGame(code);
    if(!g){ errBox.textContent="Чертог не найден."; errBox.classList.remove('hidden'); return; }
    const p = g.players.find(pl=>pl.slot===slot);
    if(!p){ errBox.textContent="Такой комнаты в этом чертоге нет."; errBox.classList.remove('hidden'); return; }
    S.role='player'; S.code=code; S.mySlot=slot; S.myName=p.name; S.game=g;
    renderPlayerShell();
    startPolling();
  };
}

/* ================================================================
   HOST SCREEN  (the "Overseer" — shared/main display)
   ================================================================ */
function renderHostShell(){
  app.innerHTML = `
  <header class="border-b border-goldline bg-[#100d16] px-5 py-3 flex justify-between items-center">
    <div class="flex items-center gap-3">
      ${eyeSigil(28)}
      <div>
        <div class="font-display text-sm font-bold text-gold tracking-widest">СМОТРИТЕЛЬ</div>
        <div class="text-[10px] text-muted">Экран чертога</div>
      </div>
    </div>
    <div class="text-center">
      <div id="round-badge" class="text-xs font-bold border border-goldline px-3 py-1 rounded text-gold panel2"></div>
    </div>
    <div class="text-right">
      <div class="text-[10px] text-muted">Код чертога</div>
      <div id="code-display" class="text-lg font-bold text-violet tracking-widest">${S.code}</div>
    </div>
  </header>
  <main class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-4 p-4 max-w-[1700px] w-full mx-auto">
    <section class="lg:col-span-4 panel rounded-xl p-4 glow-violet flex flex-col gap-3">
      <h2 class="text-xs font-bold uppercase tracking-wider text-muted mb-1">Комнаты</h2>
      <div id="host-rooms" class="grid gap-2"></div>
    </section>
    <section class="lg:col-span-8 panel rounded-xl overflow-hidden flex flex-col">
      <div class="panel2 border-b border-goldline p-4 flex items-start gap-4">
        ${eyeSigil(40)}
        <div>
          <h3 class="text-[10px] font-bold text-gold uppercase tracking-wider">Голос Смотрителя</h3>
          <p id="host-speech" class="text-sm text-gray-200 mt-1 italic leading-relaxed"></p>
        </div>
      </div>
      <div class="flex-1 p-6 flex flex-col justify-center items-center text-center">
        <div id="host-arena" class="w-full max-w-lg space-y-4"></div>
      </div>
      <div class="border-t border-goldline p-3 h-32 overflow-y-auto text-[11px] font-mono" id="host-log"></div>
    </section>
  </main>`;
  renderHostDynamic();
}

function roomStatusChip(g, p){
  if(!p) return `<span class="text-[10px] text-muted">свободна</span>`;
  if(!p.alive) return `<span class="text-[10px] text-blood">устранена</span>`;
  if(g.gunHolder===p.slot) return `<span class="text-[10px] text-blood ember">⚔ вооружена</span>`;
  if(p.inCallWith) return `<span class="text-[10px] text-violet">на связи</span>`;
  return `<span class="text-[10px] text-ok">в сети</span>`;
}

function renderHostDynamic(){
  const g = S.game;
  if(!g) return;

/* ---------- host actions ---------- */
async function hostStartGame(){
  await mutateGame(S.code, g=>{
    g.started=true; g.phase='challenge'; g.round=1; g.commsOpen=true;
    g.challenge = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
    g.hostSpeech = HOST_LINES.challenge(g.round, g.challenge);
    pushLog(g, "Испытание начато. Да начнётся первый раунд.", 'important');
  });
  const g = await getGame(S.code); S.game=g; renderHostDynamic();
}

async function hostEndChallenge(){
  await mutateGame(S.code, g=>{
    g.commsOpen=false;
    g.players.forEach(p=>{ p.inCallWith=null; if(p.alive && Math.random()>0.4) p.score+=1; });
    g.phase='processing';
    g.hostSpeech = HOST_LINES.processing;
    pushLog(g, `Раунд ${g.round} завершён. Очки распределены — но никто не узнает, кому и сколько.`);
  });
  const g = await getGame(S.code); S.game=g; renderHostDynamic();
}

async function hostOpenDiscussion(){
  await mutateGame(S.code, g=>{
    g.phase='discussion'; g.commsOpen=true;
    g.hostSpeech = HOST_LINES.discussion;
  });
  const g = await getGame(S.code); S.game=g; renderHostDynamic();
}

async function hostFinishRound(){
  await mutateGame(S.code, g=>{
    g.commsOpen=false;
    g.players.forEach(p=>p.inCallWith=null);
    g.gunHolder=null;
    g.round++;
    if(g.round>g.maxRounds){
      finalizeEnd(g);
      return;
    }
    if(g.round===GUN_ROUND){
      const alive = g.players.filter(p=>p.alive);
      if(alive.length<2){
        pushLog(g,"Клинок остался в тени — слишком мало испытуемых.",'system');
        g.phase='challenge';
        g.commsOpen=true;
        g.challenge = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
        g.hostSpeech = HOST_LINES.challenge(g.round, g.challenge);
        return;
      }
      const lucky = alive[Math.floor(Math.random()*alive.length)];
      g.gunHolder = lucky.slot;
      g.phase='gun-active';
      g.commsOpen=true;
      g.hostSpeech = HOST_LINES.gunIntro(lucky.slot);
      pushLog(g, `Клинок передан Комнате №${lucky.slot}.`, 'danger');
      return;
    }
    g.phase='challenge';
    g.commsOpen=true;
    g.challenge = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
    g.hostSpeech = HOST_LINES.challenge(g.round, g.challenge);
  });
  const g = await getGame(S.code); S.game=g; renderHostDynamic();
}

function finalizeEnd(g){
  g.phase='ended'; g.ended=true; g.commsOpen=false;
  const leaderboard=[...g.players].sort((a,b)=>b.score-a.score);
  g.winnerSlot = leaderboard.length? leaderboard[0].slot : null;
  g.hostSpeech = HOST_LINES.ended;
  pushLog(g, "Испытание окончено. Маски сняты.", 'important');
}

async function hostForceAutoShot(){
  await mutateGame(S.code, g=>{
    if(g.phase!=='gun-active' || !g.gunHolder) return;
    const shooter = g.players.find(p=>p.slot===g.gunHolder);
    const targets = g.players.filter(p=>p.alive && p.slot!==shooter.slot);
    if(!targets.length){ g.phase='gun-resolved'; g.hostSpeech=HOST_LINES.gunEmpty; return; }
    const target = targets[Math.floor(Math.random()*targets.length)];
    target.alive=false; shooter.score+=2;
    g.gunHolder=null; g.phase='gun-resolved'; g.commsOpen=false;
    g.players.forEach(p=>p.inCallWith=null);
    g.hostSpeech = HOST_LINES.gunResolved(shooter.slot, target.slot);
    pushLog(g, `Автовыстрел: Комната №${shooter.slot} устранила Комнату №${target.slot}.`, 'danger');
  });
  const g = await getGame(S.code); S.game=g; renderHostDynamic();
}

function renderCallTargets(g, me){
  const box = document.getElementById('call-targets');
  if(!g.commsOpen || !me.alive){
    box.innerHTML = `<div class="col-span-3 text-center text-[11px] text-muted py-3 panel2 rounded">Линии связи закрыты Смотрителем</div>`;
    return;
  }
  const others = g.players.filter(p=>p.slot!==me.slot);
  box.innerHTML = others.map(p=>{
    let label, cls, disabled='';
    if(!p.alive){ label='устранена'; cls='opacity-40 border-goldline'; disabled='disabled'; }
    else if(me.inCallWith===p.slot){ label='на связи'; cls='border-violet text-violet glow-violet'; }
    else if(p.inCallWith){ label='занято'; cls='border-blood/40 text-blood/80'; disabled='disabled'; }
    else{ label='свободна'; cls='border-goldline text-gray-200 hover:border-gold hover:text-gold'; }
    return `<button ${disabled} data-call="${p.slot}" class="btn panel2 border rounded p-2 text-[10px] flex flex-col items-center gap-0.5 ${cls}">
        <span class="font-bold text-xs">№${p.slot}</span><span>${label}</span>
      </button>`;
  }).join('');
  box.querySelectorAll('[data-call]').forEach(btn=>{
    btn.onclick = ()=>playerCall(parseInt(btn.dataset.call,10));
  });
}

async function playerCall(targetSlot){
  const res = await mutateGame(S.code, g=>{
    const me = g.players.find(p=>p.slot===S.mySlot);
    const target = g.players.find(p=>p.slot===targetSlot);
    if(!me || !target || !g.commsOpen) return;
    if(target.inCallWith && target.inCallWith!==me.slot){
      g.__busy = true; // transient marker, not persisted meaningfully but harmless
      return;
    }
    if(me.inCallWith){
      const oldPartner = g.players.find(p=>p.slot===me.inCallWith);
      if(oldPartner && oldPartner.inCallWith===me.slot) oldPartner.inCallWith=null;
    }
    me.inCallWith = target.slot;
    target.inCallWith = me.slot;
  });
  if(res){
    const target = res.players.find(p=>p.slot===targetSlot);
    if(target && target.inCallWith!==S.mySlot){
      S.busyFlash = targetSlot;
    }
    S.game = res;
  }
  renderPlayerDynamic();
}

async function playerHangup(){
  await mutateGame(S.code, g=>{
    const me = g.players.find(p=>p.slot===S.mySlot);
    if(!me || !me.inCallWith) return;
    const partner = g.players.find(p=>p.slot===me.inCallWith);
    if(partner && partner.inCallWith===me.slot) partner.inCallWith=null;
    me.inCallWith=null;
  });
  const g = await getGame(S.code); S.game=g; renderPlayerDynamic();
}

function renderCallBox(g, me){
  const box = document.getElementById('call-box');
  const partner = me.inCallWith;

  if(S.busyFlash===undefined) S.busyFlash=null;

  if(!partner){
    if(S.busyFlash){
      const slot=S.busyFlash; S.busyFlash=null;
      box.innerHTML = `<div class="text-center text-[11px] text-blood py-2">Линия Комнаты №${slot} занята. Попробуйте позже.</div>`;
    } else {
      box.innerHTML = '';
    }
    S.renderedCallPartner = null;
    return;
  }

  if(S.renderedCallPartner !== partner){
    S.renderedCallPartner = partner;
    box.innerHTML = `
      <div class="panel2 border border-violet rounded-lg p-3 flex flex-col gap-2">
        <div class="flex justify-between items-center">
          <span class="text-xs text-violet font-bold">Связь с Комнатой №${partner}</span>
          <button id="btn-hangup" class="text-[10px] text-blood hover:underline">Завершить</button>
        </div>
        <div id="chat-messages" class="h-32 overflow-y-auto text-xs space-y-1 pr-1"></div>
        <div id="chat-input-row" class="flex gap-2">
          <input id="chat-input" type="text" maxlength="200" placeholder="Сообщение..." class="flex-1 rounded p-2 text-xs">
          <button id="chat-send" class="btn btn-gold px-3 rounded text-xs">→</button>
        </div>
      </div>`;
    document.getElementById('btn-hangup').onclick = playerHangup;
    const input = document.getElementById('chat-input');
    const send = ()=>sendChat(partner, input);
    document.getElementById('chat-send').onclick = send;
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') send(); });
  }
  updateChatMessages(g, partner);
}

function updateChatMessages(g, partner){
  const list = document.getElementById('chat-messages');
  if(!list) return;
  const key = pairKey(S.mySlot, partner);
  const msgs = (g.chats && g.chats[key]) || [];
  const wasAtBottom = list.scrollTop + list.clientHeight >= list.scrollHeight - 10;
  list.innerHTML = msgs.map(m=>`
    <div class="${m.from===S.mySlot?'text-right':'text-left'}">
      <span class="inline-block px-2 py-1 rounded ${m.from===S.mySlot?'bg-gold text-[#1a1208]':'panel2 border border-goldline text-gray-200'}">${esc(m.text)}</span>
    </div>`).join('') || `<div class="text-muted text-center text-[10px] py-2">Линия открыта. Скажите что-нибудь.</div>`;
  if(wasAtBottom) list.scrollTop = list.scrollHeight;
}

async function sendChat(partner, input){
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  await mutateGame(S.code, g=>{
    const me = g.players.find(p=>p.slot===S.mySlot);
    if(!me || me.inCallWith!==partner) return;
    const key = pairKey(S.mySlot, partner);
    g.chats = g.chats || {};
    g.chats[key] = g.chats[key] || [];
    g.chats[key].push({from:S.mySlot, text, ts:Date.now()});
    if(g.chats[key].length>150) g.chats[key] = g.chats[key].slice(-150);
  });
  const g = await getGame(S.code); S.game=g; renderPlayerDynamic();
  const freshInput = document.getElementById('chat-input');
  if(freshInput) freshInput.focus();
}

async function playerShoot(targetSlot){
  await mutateGame(S.code, g=>{
    if(g.phase!=='gun-active' || g.gunHolder!==S.mySlot) return;
    const shooter = g.players.find(p=>p.slot===S.mySlot);
    const target = g.players.find(p=>p.slot===targetSlot);
    if(!shooter || !target || !target.alive) return;
    target.alive=false; shooter.score+=2;
    g.gunHolder=null; g.phase='gun-resolved'; g.commsOpen=false;
    g.players.forEach(p=>p.inCallWith=null);
    g.hostSpeech = HOST_LINES.gunResolved(shooter.slot, target.slot);
    pushLog(g, `Комната №${shooter.slot} устранила Комнату №${target.slot} клинком Смотрителя.`, 'danger');
  });
  const g = await getGame(S.code); S.game=g; renderPlayerDynamic();
}

/* ---------------- boot ---------------- */
renderLanding();
</script>
