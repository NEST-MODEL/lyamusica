<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarWorm — угадай трек</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --card: #16161f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #c8ff00;
    --accent2: #ff3cac;
    --accent3: #00e5ff;
    --text: #f0f0f0;
    --muted: #6b6b7a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === NOISE OVERLAY === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* === GLOW BLOBS === */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
    animation: blobmove 8s ease-in-out infinite alternate;
  }
  .blob1 { width: 600px; height: 600px; background: #c8ff00; top: -200px; left: -200px; }
  .blob2 { width: 500px; height: 500px; background: #ff3cac; bottom: -150px; right: -150px; animation-delay: -4s; }

  @keyframes blobmove {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(40px, 30px) scale(1.08); }
  }

  /* === LAYOUT === */
  #app { position: relative; z-index: 1; }

  /* ==================== SCREENS ==================== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }

  /* ==================== HOME ==================== */
  .home-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 10vw, 7rem);
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .home-sub {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .name-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .name-input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    padding: 0.75rem 1.25rem;
    border-radius: 8px;
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--muted); }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    max-width: 600px;
    width: 100%;
    margin-bottom: 1.5rem;
  }

  @media (min-width: 600px) {
    .categories-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .cat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .cat-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cat-card:hover { border-color: var(--border2); transform: translateY(-3px); }
  .cat-card:hover::after { opacity: 0.04; }
  .cat-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .cat-card.selected::after { opacity: 0.08; }

  .cat-icon { font-size: 2.2rem; margin-bottom: 0.5rem; display: block; }
  .cat-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
  }

  .btn-start {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 1rem 3rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-start:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(200,255,0,0.4); }
  .btn-start:active { transform: scale(0.98); }
  .btn-start:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-board {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.2s;
  }
  .btn-board:hover { border-color: var(--border2); color: var(--text); }

  /* ==================== GAME ==================== */
  .game-header {
    width: 100%;
    max-width: 700px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .game-player { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .game-score { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  
  .game-progress-bar {
    width: 100%;
    max-width: 700px;
    height: 3px;
    background: var(--bg3);
    border-radius: 99px;
    margin-bottom: 2.5rem;
    overflow: hidden;
  }
  .game-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .track-num {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  /* === WAVEFORM VISUALIZER === */
  .waveform-wrap {
    position: relative;
    width: 100%;
    max-width: 500px;
    margin-bottom: 2rem;
  }
  .waveform-bg {
    width: 100%;
    height: 90px;
    display: flex;
    align-items: center;
    gap: 3px;
    justify-content: center;
  }
  .wave-bar {
    width: 4px;
    border-radius: 99px;
    background: var(--border2);
    transition: background 0.3s;
    animation: waveIdle 1.2s ease-in-out infinite alternate;
  }
  .wave-bar.playing {
    background: var(--accent);
    animation: wavePulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes waveIdle {
    from { height: 8px; }
    to { height: 14px; }
  }
  @keyframes wavePulse {
    from { height: var(--h-min, 10px); opacity: 0.8; }
    to { height: var(--h-max, 60px); opacity: 1; }
  }

  /* === PLAYER CONTROLS === */
  .player-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    width: 100%;
    max-width: 500px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .play-btn {
    width: 64px;
    height: 64px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .play-btn:hover { transform: scale(1.08); box-shadow: 0 0 30px rgba(200,255,0,0.5); }
  .play-btn svg { width: 26px; height: 26px; fill: #000; }
  .play-hint { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-align: center; }

  /* === ANSWERS WRAP === */
  .answers-grid {
    width: 100%;
    max-width: 500px;
    margin-bottom: 1.5rem;
  }

  /* === FEEDBACK === */
  .feedback-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    background: rgba(10,10,15,0.8);
  }
  .feedback-overlay.show { opacity: 1; }
  .feedback-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    text-align: center;
    padding: 0 1rem;
    animation: feedbackPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .feedback-text.correct { color: var(--accent); }
  .feedback-text.wrong { color: var(--accent2); }
  @keyframes feedbackPop {
    from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ==================== RESULT ==================== */
  .result-score-big {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(5rem, 18vw, 10rem);
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.04em;
    margin-bottom: 0.5rem;
  }
  .result-label { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .result-verdict {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 2.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .result-stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat-item { text-align: center; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text); }
  .stat-lbl { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 0.2rem; }

  .btn-row { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.8rem 2rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* ==================== LEADERBOARD ==================== */
  .board-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 8vw, 4rem);
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: -0.03em;
    margin-bottom: 2rem;
    text-align: center;
  }
  .board-title span { color: var(--accent); }

  .board-list { width: 100%; max-width: 500px; }
  .board-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    margin-bottom: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .board-row:first-child { border-color: var(--accent); background: rgba(200,255,0,0.05); }
  .board-rank {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    width: 2rem;
    color: var(--muted);
    flex-shrink: 0;
    text-align: center;
  }
  .board-row:first-child .board-rank { color: var(--accent); }
  .board-name { flex: 1; font-size: 0.9rem; }
  .board-cat { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .board-pts {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--accent);
  }
  .board-empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 3rem; }

  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<canvas id="confetti-canvas"></canvas>

<div id="app">

  <!-- ===== HOME ===== -->
  <div class="screen active" id="screen-home">
    <div class="home-logo">EarWorm</div>
    <div class="home-sub">угадай трек · соревнуйся с друзьями</div>

    <div class="name-row">
      <input class="name-input" id="player-name" placeholder="твой ник..." maxlength="20" />
    </div>

    <div class="categories-grid" id="cat-grid">
      <div class="cat-card" data-cat="games">
        <span class="cat-icon">🎮</span>
        <div class="cat-name">Игры</div>
      </div>
      <div class="cat-card" data-cat="music">
        <span class="cat-icon">🎵</span>
        <div class="cat-name">Музыка</div>
      </div>
      <div class="cat-card" data-cat="movies">
        <span class="cat-icon">🎬</span>
        <div class="cat-name">Фильмы</div>
      </div>
      <div class="cat-card" data-cat="cartoons">
        <span class="cat-icon">🎨</span>
        <div class="cat-name">Мультики</div>
      </div>
    </div>

    <button class="btn-start" id="btn-start" disabled>Начать игру</button>
    <button class="btn-board" onclick="showBoard()">🏆 Лидерборд</button>
  </div>

  <!-- ===== GAME ===== -->
  <div class="screen" id="screen-game">
    <div class="game-header">
      <div>
        <div class="game-player" id="g-player">Player</div>
        <div class="game-score" id="g-score">0 pts</div>
      </div>
    </div>

    <div class="game-progress-bar">
      <div class="game-progress-fill" id="progress-fill"></div>
    </div>

    <div class="track-num" id="track-num">ТРЕК 1 / 10</div>

    <div class="waveform-wrap">
      <div class="waveform-bg" id="waveform"></div>
    </div>

    <div class="player-wrap">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">
        <svg viewBox="0 0 24 24" id="play-icon"><polygon points="6,3 20,12 6,21"/></svg>
      </button>
      <div class="play-hint" id="play-hint">нажми чтобы послушать</div>
    </div>

    <div class="answers-grid" id="answers-grid"></div>
  </div>

  <!-- ===== RESULT ===== -->
  <div class="screen" id="screen-result">
    <div class="result-label">итог</div>
    <div class="result-score-big" id="r-score">0</div>
    <div class="result-verdict" id="r-verdict">неплохо!</div>
    <div class="result-stats">
      <div class="stat-item">
        <div class="stat-val" id="r-correct">0</div>
        <div class="stat-lbl">правильно</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-start" onclick="playAgain()">Ещё раз</button>
      <button class="btn-outline" onclick="showBoard()">Лидерборд</button>
      <button class="btn-outline" onclick="goHome()">Домой</button>
    </div>
  </div>

  <!-- ===== LEADERBOARD ===== -->
  <div class="screen" id="screen-board">
    <div class="board-title">Лидер<span>борд</span></div>
    <div class="board-list" id="board-list"></div>
    <br>
    <button class="btn-outline" onclick="goHome()">← Назад</button>
  </div>

</div>

<div class="feedback-overlay" id="feedback-overlay">
  <div class="feedback-text" id="feedback-text"></div>
</div>

<audio id="audio-player" preload="none"></audio>

<script>
// ===================================================
// БАЗА ДАННЫХ ТРЕКОВ
// Замените ссылки на свои реальные mp3-файлы
// ===================================================
const TRACKS = {
  games: [
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', answer: 'Witcher 3' },
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', answer: 'Skyrim' },
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3', answer: 'Minecraft' }
  ],
  music: [
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3', answer: 'Blinding Lights' },
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3', answer: 'Believer' }
  ],
  movies: [
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3', answer: 'Interstellar' },
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3', answer: 'Inception' }
  ],
  cartoons: [
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3', answer: 'Shrek' },
    { src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3', answer: 'The Lion King' }
  ]
};

const TIMESTEPS = [1, 2, 3, 5, 10, 20]; // Секунды для шагов Songless

// === STATE ===
let state = {
  player: '',
  category: null,
  queue: [],
  current: 0,
  score: 0,
  correct: 0,
  playing: false,
  currentStep: 0,      
  trackGuessed: false 
};

const audio = document.getElementById('audio-player');

// Контроль времени проигрывания шага
audio.addEventListener('timeupdate', () => {
  const maxPlayTime = TIMESTEPS[state.currentStep];
  if (audio.currentTime >= maxPlayTime) {
    stopTrack();
  }
});

audio.addEventListener('ended', () => {
  stopTrack();
});

// === WAVEFORM ===
function buildWaveform() {
  const wf = document.getElementById('waveform');
  wf.innerHTML = '';
  const count = 40;
  for (let i = 0; i < count; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    const hMin = 6 + Math.random() * 10;
    const hMax = 20 + Math.random() * 55;
    bar.style.setProperty('--h-min', hMin + 'px');
    bar.style.setProperty('--h-max', hMax + 'px');
    bar.style.height = hMin + 'px';
    bar.style.animationDelay = (Math.random() * 1.2) + 's';
    bar.style.animationDuration = (0.5 + Math.random() * 0.8) + 's';
    wf.appendChild(bar);
  }
}

function setPlayIcon(playing) {
  const icon = document.getElementById('play-icon');
  if (playing) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    icon.innerHTML = '<polygon points="6,3 20,12 6,21"/>';
  }
}

function togglePlay() {
  if (state.playing) {
    stopTrack();
  } else {
    if (audio.src) {
      audio.currentTime = 0; 
      audio.play().catch((err) => console.log("Ошибка воспроизведения:", err));
      state.playing = true;
      setPlayIcon(true);
      document.querySelectorAll('.wave-bar').forEach(b => b.classList.add('playing'));
    }
  }
}

function stopTrack() {
  audio.pause();
  state.playing = false;
  setPlayIcon(false);
  document.querySelectorAll('.wave-bar').forEach(b => b.classList.remove('playing'));
}

// === CATEGORY SELECT ===
document.getElementById('cat-grid').addEventListener('click', e => {
  const card = e.target.closest('.cat-card');
  if (!card) return;
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  state.category = card.dataset.cat;
  checkStartReady();
});

document.getElementById('player-name').addEventListener('input', checkStartReady);

function checkStartReady() {
  const name = document.getElementById('player-name').value.trim();
  document.getElementById('btn-start').disabled = !(name && state.category);
}

document.getElementById('btn-start').addEventListener('click', startGame);

// === GAME LOGIC ===
function startGame() {
  const name = document.getElementById('player-name').value.trim();
  if (!name || !state.category) return;

  state.player = name;
  const allTracks = [...TRACKS[state.category]];

  if(allTracks.length === 0) {
    alert("В этой категории пока нет треков!");
    return;
  }

  // Перемешивание
  for (let i = allTracks.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allTracks[i], allTracks[j]] = [allTracks[j], allTracks[i]];
  }
  state.queue = allTracks.slice(0, Math.min(10, allTracks.length));
  state.current = 0;
  state.score = 0;
  state.correct = 0;

  showScreen('screen-game');
  loadTrack();
}

function loadTrack() {
  const track = state.queue[state.current];
  const total = state.queue.length;

  state.currentStep = 0;
  state.trackGuessed = false;

  document.getElementById('g-player').textContent = state.player.toUpperCase();
  document.getElementById('g-score').textContent = state.score + ' pts';
  document.getElementById('track-num').textContent = `ТРЕК ${state.current + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = ((state.current / total) * 100) + '%';

  audio.pause();
  audio.src = track.src;
  audio.load();
  state.playing = false;
  setPlayIcon(false);
  
  buildWaveform();
  updateSonglessUI();
}

function updateSonglessUI() {
  const maxTime = TIMESTEPS[state.currentStep];
  document.getElementById('play-hint').textContent = `Доступно: ${maxTime} сек. (Попытка ${state.currentStep + 1} из ${TIMESTEPS.length})`;

  const grid = document.getElementById('answers-grid');
  grid.removeAttribute('style'); 
  grid.style.display = 'flex';
  grid.style.flexDirection = 'column';
  grid.style.gap = '10px';

  grid.innerHTML = `
    <input type="text" id="guess-input" class="name-input" style="width: 100%; max-width: 500px;" placeholder="Введите название..." autocomplete="off">
    <div style="display: flex; gap: 10px; width: 100%; max-width: 500px;">
      <button class="btn-outline" id="btn-skip" style="flex: 1;">Пропустить</button>
      <button class="btn-start" id="btn-submit" style="padding: 0.8rem 2rem; font-size: 0.85rem;">Ответить</button>
    </div>
  `;

  document.getElementById('btn-skip').addEventListener('click', () => handleGuess(false));
  document.getElementById('btn-submit').addEventListener('click', () => {
    const val = document.getElementById('guess-input').value.trim();
    if(val) handleGuess(val);
  });

  // Отправка по Enter
  document.getElementById('guess-input').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') {
      const val = document.getElementById('guess-input').value.trim();
      if(val) handleGuess(val);
    }
  });
}

function handleGuess(userAnswer) {
  const track = state.queue[state.current];
  stopTrack();

  if (userAnswer !== false) {
    if (userAnswer.toLowerCase() === track.answer.toLowerCase()) {
      state.trackGuessed = true;
    }
  }

  if (state.trackGuessed) {
    const pts = 500 - (state.currentStep * 70);
    state.score += pts;
    state.correct++;
    showFeedback('ПРАВИЛЬНО! +' + pts, true);
    document.getElementById('g-score').textContent = state.score + ' pts';
    setTimeout(nextTrack, 2000);
  } else {
    state.currentStep++;
    
    if (state.currentStep >= TIMESTEPS.length) {
      showFeedback('НЕ УГАДАЛ! Это: ' + track.answer, false);
      setTimeout(nextTrack, 3000);
    } else {
      showFeedback('НЕПРАВИЛЬНО! Время увеличено', false);
      setTimeout(updateSonglessUI, 1500);
    }
  }
}

function nextTrack() {
  state.current++;
  if (state.current >= state.queue.length) {
    endGame();
  } else {
    loadTrack();
  }
}

function showFeedback(text, correct) {
  const overlay = document.getElementById('feedback-overlay');
  const el = document.getElementById('feedback-text');
  el.textContent = text;
  el.style.fontSize = 'clamp(1.5rem, 5vw, 2.5rem)'; 
  el.className = 'feedback-text ' + (correct ? 'correct' : 'wrong');
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 1500);
}

// === END GAME ===
function endGame() {
  stopTrack();
  document.getElementById('progress-fill').style.width = '100%';

  const total = state.queue.length;
  document.getElementById('r-score').textContent = state.score;
  document.getElementById('r-correct').textContent = `${state.correct}/${total}`;
  
  document.getElementById('r-verdict').textContent = state.correct > (total / 2) ? "Отличный слух!" : "Надо потренироваться...";

  if(state.correct === total && total > 0) {
    spawnConfetti();
  }

  saveScore();
  showScreen('screen-result');
}

// === LEADERBOARD (localStorage) ===
function saveScore() {
  const key = 'earworm_scores';
  const scores = JSON.parse(localStorage.getItem(key) || '[]');
  scores.push({
    name: state.player,
    score: state.score,
    correct: state.correct,
    total: state.queue.length,
    category: state.category,
    date: Date.now()
  });
  scores.sort((a,b) => b.score - a.score);
  localStorage.setItem(key, JSON.stringify(scores.slice(0, 50)));
}

function showBoard() {
  const key = 'earworm_scores';
  const scores = JSON.parse(localStorage.getItem(key) || '[]');
  const list = document.getElementById('board-list');
  const catIcons = { games:'🎮', music:'🎵', movies:'🎬', cartoons:'🎨' };

  if (!scores.length) {
    list.innerHTML = '<div class="board-empty">Пока нет результатов.<br>Стань первым!</div>';
  } else {
    list.innerHTML = scores.slice(0,15).map((s, i) => `
      <div class="board-row">
        <div class="board-rank">${i === 0 ? '👑' : i+1}</div>
        <div style="flex: 1;">
          <div class="board-name">${escHtml(s.name)}</div>
          <div class="board-cat">${catIcons[s.category]||''} ${s.category} · ${s.correct}/${s.total} угадано</div>
        </div>
        <div class="board-pts">${s.score}</div>
      </div>
    `).join('');
  }
  showScreen('screen-board');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// === NAVIGATION ===
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopTrack();
  showScreen('screen-home');
}

function playAgain() {
  startGame();
}

// === CONFETTI ===
function spawnConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  let particles = [];
  for(let i=0; i<100; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      r: Math.random() * 6 + 4,
      d: Math.random() * canvas.height,
      color: ["#c8ff00", "#ff3cac", "#00e5ff", "#f0f0f0"][Math.floor(Math.random() * 4)]
    });
  }
  
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.y += Math.random() * 4 + 2;
    });
  }
  
  let timer = setInterval(draw, 20);
  setTimeout(() => {
    clearInterval(timer);
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }, 4000);
}
</script>
