<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE BUNKER V.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #121218;
    --surface-card: #1a1a24;
    --accent: #ff5500;
    --accent-glow: rgba(255, 85, 0, 0.3);
    --grey-dark: #242430;
    --grey-light: #4a4a5a;
    --text: #e6e6ee;
    --text-muted: #808090;
    --border: rgba(255, 85, 0, 0.2);
    
    /* Состояния систем */
    --sys-good: #00ff66;
    --sys-good-glow: rgba(0, 255, 102, 0.2);
    --sys-bad: #ff2233;
    --sys-bad-glow: rgba(255, 34, 51, 0.2);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background-color: var(--bg);
    background-image: 
      radial-gradient(circle at 50% 30%, rgba(255, 85, 0, 0.08), transparent 70%),
      linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), 
      linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 100%, 100% 4px, 6px 100%;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
    width: 100%;
    max-width: 1000px;
  }

  .main-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent-glow);
    letter-spacing: 3px;
    margin-bottom: 5px;
  }

  .sub-title {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .container {
    width: 100%;
    max-width: 1000px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
  }

  /* Сетки и адаптивность */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 768px) {
    body { padding: 10px; }
    .main-title { font-size: 1.6rem; }
    .grid-2 { grid-template-columns: 1fr; }
    .container { padding: 15px; }
    .btn { width: 100%; padding: 14px !important; font-size: 1rem !important; }
    input[type="text"], select { font-size: 16px !important; } /* Защита от зума на iOS */
  }

  .card {
    background: var(--surface-card);
    border: 1px solid var(--grey-dark);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 15px;
  }

  .card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    text-transform: uppercase;
  }

  /* Формы и элементы управления */
  .form-group {
    margin-bottom: 15px;
  }

  label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  input[type="text"], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--grey-dark);
    color: var(--text);
    padding: 12px;
    border-radius: 6px;
    font-family: inherit;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .btn {
    background: var(--grey-dark);
    color: var(--text);
    border: 1px solid var(--grey-light);
    padding: 10px 20px;
    font-family: inherit;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .btn-accent:hover {
    background: #ff7722;
  }

  /* Динамические бары систем жизнеобеспечения */
  .system-status {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .sys-item {
    background: var(--bg);
    padding: 10px;
    border-radius: 6px;
    border-left: 4px solid var(--sys-good);
  }

  .sys-item.critical {
    border-left-color: var(--sys-bad);
  }

  .sys-header {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    margin-bottom: 6px;
  }

  .sys-bar-bg {
    background: var(--grey-dark);
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
  }

  .sys-bar-fill {
    height: 100%;
    width: 100%;
    background: var(--sys-good);
    box-shadow: 0 0 8px var(--sys-good-glow);
    transition: width 0.5s ease, background-color 0.5s ease;
  }

  .critical .sys-bar-fill {
    background: var(--sys-bad);
    box-shadow: 0 0 8px var(--sys-bad-glow);
  }

  /* Игровые логи и списки игроков */
  .terminal-log {
    background: var(--bg);
    border: 1px solid var(--grey-dark);
    height: 150px;
    overflow-y: auto;
    padding: 10px;
    font-size: 0.8rem;
    border-radius: 6px;
    color: var(--text-muted);
  }

  .log-entry {
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .log-entry.important {
    color: var(--accent);
  }

  .player-list-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 0.85rem;
    border: 1px solid transparent;
  }

  .player-list-item.active {
    border-color: var(--border);
  }

  /* Экран окончания игры */
  .game-over-screen {
    text-align: center;
    padding: 30px 10px;
  }

  .game-over-title {
    font-family: 'Orbitron', sans-serif;
    color: var(--sys-bad);
    font-size: 1.8rem;
    margin-bottom: 15px;
    text-shadow: 0 0 10px var(--sys-bad-glow);
  }

  /* Скроллбар */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--grey-dark);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="main-title">THE BUNKER V.2</div>
  <div class="sub-title">Система тактического жизнеобеспечения</div>
</header>

<div class="container" id="main-window">
  <div id="auth-screen" class="grid-2">
    <div class="card">
      <div class="card-title">Создать сессию (Хост)</div>
      <div class="form-group">
        <label>Имя Смотрителя</label>
        <input type="text" id="host-name-input" placeholder="Командир...">
      </div>
      <button class="btn btn-accent" onclick="initSession('host')">Инициализировать Бункер</button>
      <div style="margin-top: 15px; font-size: 0.75rem; color: var(--text-muted);" id="host-peer-id"></div>
    </div>

    <div class="card">
      <div class="card-title">Подключиться к терминалу</div>
      <div class="form-group">
        <label>Имя выжившего</label>
        <input type="text" id="client-name-input" placeholder="Выживший...">
      </div>
      <div class="form-group">
        <label>Идентификатор Бункера (Peer ID)</label>
        <input type="text" id="client-target-id" placeholder="Вставьте ID хоста...">
      </div>
      <button class="btn" onclick="initSession('client')">Установить соединение</button>
    </div>
  </div>

  <div id="game-screen" style="display: none;" class="grid-2">
    <div>
      <div class="card">
        <div class="card-title">Статус систем жизнеобеспечения</div>
        <div class="system-status">
          <div class="sys-item" id="sys-o2-container">
            <div class="sys-header">
              <span>Регенерация O₂</span>
              <span id="status-o2-val">100%</span>
            </div>
            <div class="sys-bar-bg">
              <div class="sys-bar-fill" id="status-o2-bar" style="width: 100%;"></div>
            </div>
          </div>
          <div class="sys-item" id="sys-power-container">
            <div class="sys-header">
              <span>Ядро питания</span>
              <span id="status-power-val">100%</span>
            </div>
            <div class="sys-bar-bg">
              <div class="sys-bar-fill" id="status-power-bar" style="width: 100%;"></div>
            </div>
          </div>
          <div class="sys-item" id="sys-water-container">
            <div class="sys-header">
              <span>Фильтрация H₂O</span>
              <span id="status-water-val">100%</span>
            </div>
            <div class="sys-bar-bg">
              <div class="sys-bar-fill" id="status-water-bar" style="width: 100%;"></div>
            </div>
          </div>
        </div>
        
        <div id="host-controls" style="display: none; margin-top: 15px; border-top: 1px solid var(--grey-dark); padding-top: 15px;">
          <label>Управление ресурсами (Хост)</label>
          <div style="display: flex; gap: 10px; margin-top: 5px; flex-wrap: wrap;">
            <button class="btn" onclick="modifyResource('o2', -15)">- O₂</button>
            <button class="btn" onclick="modifyResource('o2', 15)">+ O₂</button>
            <button class="btn" onclick="modifyResource('power', -15)">- Энерг</button>
            <button class="btn" onclick="modifyResource('power', 15)">+ Энерг</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Ваш профиль выжившего</div>
        <div id="character-card-data" style="font-size: 0.85rem; line-height: 1.6; color: var(--text-muted);">
          Генерация данных...
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-title">Выжившие в сети</div>
        <div id="players-list">
          </div>
      </div>

      <div class="card">
        <div class="card-title">Журнал терминала</div>
        <div class="terminal-log" id="terminal-log">
          <div class="log-entry">Система готова к запуску...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let peer = null;
  let conn = null; 
  let myRole = ''; 
  let myName = '';
  let connections = []; 
  let activePlayers = [];

  // Состояние ресурсов
  let resources = {
    o2: 100,
    power: 100,
    water: 100
  };

  // Базовые списки характеристик для игры в Бункер
  const professions = ["Врач", "Инженер", "Агроном", "Ученый", "Военный", "Повар", "Строитель", "Программист"];
  const HealthStates = ["Идеальное здоровье", "Легкое недомогание", "Хроническая аллергия", "Снижен иммунитет", "Травма ноги"];
  const LuggageItems = ["Аптечка", "Набор инструментов", "Запас семян", "Охотничий нож", "Книга по выживанию", "Фонарик"];

  let myCharacter = {
    prof: '',
    health: '',
    luggage: ''
  };

  function logToTerminal(text, isImportant = false) {
    const logBox = document.getElementById('terminal-log');
    const entry = document.createElement('div');
    entry.className = `log-entry ${isImportant ? 'important' : ''}`;
    entry.innerText = `[${new Date().toLocaleTimeString()}] ${text}`;
    logBox.appendChild(entry);
    logBox.scrollTop = logBox.scrollHeight;
  }

  function generateCharacter() {
    myCharacter.prof = professions[Math.floor(Math.random() * professions.length)];
    myCharacter.health = HealthStates[Math.floor(Math.random() * HealthStates.length)];
    myCharacter.luggage = LuggageItems[Math.floor(Math.random() * LuggageItems.length)];
    
    renderCharacter();
  }

  function renderCharacter() {
    const box = document.getElementById('character-card-data');
    box.innerHTML = `
      <div><b>Профессия:</b> <span style="color:var(--text);">${myCharacter.prof}</span></div>
      <div><b>Здоровье:</b> <span style="color:var(--text);">${myCharacter.health}</span></div>
      <div><b>Багаж:</b> <span style="color:var(--text);">${myCharacter.luggage}</span></div>
    `;
  }

  function updateSystemBars() {
    // Обновление шкал и динамическая смена цвета в зависимости от уровня ресурса (< 40% - критический)
    const resourcesList = ['o2', 'power', 'water'];
    resourcesList.forEach(res => {
      const val = resources[res];
      const bar = document.getElementById(`status-${res}-bar`);
      const text = document.getElementById(`status-${res}-val`);
      const container = document.getElementById(`sys-${res}-container`);
      
      if(bar && text && container) {
        bar.style.width = `${val}%`;
        text.innerText = `${val}%`;
        
        if(val <= 40) {
          container.classList.add('critical');
        } else {
          container.classList.remove('critical');
        }
      }
    });
  }

  function modifyResource(type, amount) {
    if(myRole !== 'host') return;
    resources[type] = Math.max(0, Math.min(100, resources[type] + amount));
    updateSystemBars();
    broadcast({ type: 'sync-resources', data: resources });
    logToTerminal(`Ресурсы изменены: ${type.toUpperCase()} -> ${resources[type]}%`);
    checkGameOverStatus();
  }

  function initSession(role) {
    myRole = role;
    if(role === 'host') {
      myName = document.getElementById('host-name-input').value.trim() || 'Смотритель';
      peer = new Peer();
      
      peer.on('open', (id) => {
        document.getElementById('host-peer-id').innerText = `ID сессии терминала: ${id}`;
        logToTerminal(`Бункер создан. Ожидание сигналов выживших...`);
        transitionToGame();
        
        activePlayers.push({ id: 'Host', name: myName, role: 'host' });
        renderPlayersList();
      });

      peer.on('connection', (connEx) => {
        connections.push(connEx);
        setupReceiver(connEx);
      });

    } else {
      myName = document.getElementById('client-name-input').value.trim() || 'Выживший';
      const targetId = document.getElementById('client-target-id').value.trim();
      
      if(!targetId) {
        alert('Введите ID терминала хоста!');
        return;
      }

      peer = new Peer();
      peer.on('open', () => {
        conn = peer.connect(targetId);
        setupReceiver(conn);
        conn.on('open', () => {
          logToTerminal(`Успешное сопряжение с шлюзом бункера.`);
          conn.send({ type: 'join-request', name: myName });
          transitionToGame();
        });
      });
    }
    generateCharacter();
  }

  function transitionToGame() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    if(myRole === 'host') {
      document.getElementById('host-controls').style.display = 'block';
    }
    updateSystemBars();
  }

  function setupReceiver(c) {
    c.on('data', (payload) => {
      switch(payload.type) {
        case 'join-request':
          if(myRole === 'host') {
            activePlayers.push({ id: c.peer, name: payload.name, role: 'client' });
            logToTerminal(`Выживший ${payload.name} зашел в шлюз.`);
            renderPlayersList();
            broadcast({ type: 'sync-players', data: activePlayers });
            broadcast({ type: 'sync-resources', data: resources });
          }
          break;
        case 'sync-players':
          activePlayers = payload.data;
          renderPlayersList();
          break;
        case 'sync-resources':
          resources = payload.data;
          updateSystemBars();
          break;
        case 'game-over-screen':
          showGameOverScreen(payload.winner, payload.msg);
          break;
      }
    });
  }

  function broadcast(data) {
    connections.forEach(c => {
      if(c.open) c.send(data);
    });
  }

  function renderPlayersList() {
    const list = document.getElementById('players-list');
    list.innerHTML = '';
    activePlayers.forEach(p => {
      const div = document.createElement('div');
      div.className = `player-list-item ${p.name === myName ? 'active' : ''}`;
      div.innerHTML = `
        <span>${p.name} <small style="color:var(--text-muted);">[${p.role.toUpperCase()}]</small></span>
        <span style="color:var(--sys-good);">● ONLINE</span>
      `;
      list.appendChild(div);
    });
  }

  function checkGameOverStatus() {
    if(myRole !== 'host') return;
    if(resources.o2 <= 0 || resources.power <= 0) {
      let finalMsg = `Критический сбой систем. Жизнеобеспечение бункера остановлено полностью.`;
      showGameOverScreen("НИКТО", finalMsg);
      broadcast({ type: 'game-over-screen', winner: "НИКТО", msg: finalMsg });
    }
  }

  function showGameOverScreen(winner, message) {
    const mainWindow = document.getElementById('main-window');
    mainWindow.innerHTML = `
      <div class="game-over-screen">
        <h1 class="game-over-title">🔒 БУНКЕР ЗАПЕЧАТАН</h1>
        <div class="card" style="text-align: left; max-width: 500px; margin: 0 auto 20px;">
          <b style="color:var(--accent);">Отчет главного терминала:</b><br>
          <span style="color:var(--text-muted); font-size:0.9rem;">${message}</span>
        </div>
        <button class="btn btn-accent" onclick="window.location.reload()">Перезапустить Терминал</button>
      </div>
    `;
  }
</script>

</body>
</html>
