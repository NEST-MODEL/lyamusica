<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CyberBunker 1v1v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<style>
  :root {
    --bg: #06060c;
    --neon: #ffaa00;
    --card: #111122;
    --text: #ffffff;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  
  body {
    background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0; opacity: 0.3;
  }

  .window {
    position: relative; z-index: 10; background: var(--card);
    padding: 2rem; border-radius: 24px; border: 1px solid var(--border);
    width: 95%; max-width: 450px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.7);
  }

  h1 { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; color: var(--neon); text-shadow: 0 0 15px rgba(255,170,0,0.2); }

  .btn {
    background: transparent; border: 2px solid var(--neon); color: #fff;
    padding: 1rem; width: 100%; border-radius: 12px; font-family: 'Orbitron', sans-serif;
    font-weight: 700; font-size: 0.95rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

  .input-field {
    width: 100%; padding: 1rem; background: #16162a; border: 1px solid var(--border);
    color: #fff; border-radius: 12px; font-family: inherit; text-align: center; font-size: 1.1rem; margin-bottom: 1rem; outline: none;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* Стили карточки характеристик */
  .bunker-info { background: #090914; padding: 1rem; border-radius: 12px; text-align: left; font-size: 0.85rem; border-left: 4px solid var(--neon); margin-bottom: 1.5rem; }
  .char-row { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .char-label { color: #666; font-size: 0.8rem; text-transform: uppercase; }
  .char-val { font-weight: bold; color: #fff; }
  .char-val.hidden { color: #ff3366; font-style: italic; font-weight: normal; }
</style>
</head>
<body>

  <div class="window">
    <div id="scr-connect" class="screen active">
      <h1>CyberBunker</h1>
      <div id="net-status" style="color: #666; margin-bottom: 1.5rem; font-size: 0.85rem;">Загрузка протокола выживания...</div>
      <input type="text" id="player-name" class="input-field" placeholder="Твой ник..." maxlength="12">
      <button class="btn" id="btn-create" onclick="createRoom()" style="display:none;">Создать бункер (Хост)</button>
      <div style="margin: 0.5rem 0; color: #333;">— ИЛИ —</div>
      <input type="number" id="room-id" class="input-field" placeholder="ID бункера хоста...">
      <button class="btn" id="btn-join" onclick="joinRoom()" style="display:none;">Постучаться в бункер</button>
    </div>

    <div id="scr-lobby" class="screen">
      <h1>Гермозатвор</h1>
      <div style="font-size: 0.9rem; margin-bottom: 1rem;">Код шлюза: <b id="lobby-code" style="color:var(--neon); font-size: 1.4rem;">-</b></div>
      <div style="text-align: left; margin-bottom: 1.5rem;">
        <div style="color:#555; font-size:0.8rem; margin-bottom: 0.5rem;">ЖЕЛАЮЩИЕ ВОЙТИ (НАДО 3 ИГРОКА):</div>
        <ul id="player-list" style="list-style: none; color: var(--neon);"></ul>
      </div>
      <button class="btn" id="btn-start-game" onclick="generateBunkerSession()" style="display:none;">Герметизировать и Начать</button>
      <div id="client-wait-msg" style="color:#555; font-size:0.85rem; display:none;">Хост проверяет запасы... Ждите старта.</div>
    </div>

    <div id="scr-game" class="screen">
      <h2 id="round-title" style="color:var(--neon); font-size:1.2rem; margin-bottom: 1rem;">РАУНД 1: Знакомство</h2>
      
      <div class="bunker-info">
        <div style="font-weight:bold; color:var(--neon); margin-bottom:0.3rem;">УСЛОВИЯ МИРА:</div>
        <div id="bunker-disaster" style="margin-bottom:0.5rem; font-weight:bold;">Загрузка...</div>
        <div id="bunker-desc" style="color:#aaa;">Загрузка...</div>
      </div>

      <div style="text-align:left; font-weight:bold; font-size:0.9rem; margin-bottom:0.5rem; color:var(--neon);">ТВОЁ ДОСЬЕ:</div>
      <div id="dossier-box" style="margin-bottom:1.5rem;"></div>

      <button class="btn" id="btn-action" onclick="nextRoundAction()">Открыть следующие данные</button>
    </div>
  </div>

<script>
  // Списки для генерации карт персонажей
  const DISASTERS = [
    { name: "Ядерная зима", desc: "Температура на улице -60°C. Бункер оборудован хорошим генератором, но запасов еды строго на двоих на 1 год." },
    { name: "Восстание ИИ и Киборгов", desc: "Роботы выкашивают всё живое. Бункер полностью экранирован, но фильтрация воды работает на честном слове." },
    { name: "Генетическая чума", desc: "Вирус превращает людей в слизь. Бункер стерилен, но медицинский отсек пуст, инструментов нет." }
  ];

  const PROFESSIONS = ["Инженер-физик", "Врач-хирург", "Программист ИИ", "Фермер-агроном", "Военный спецназовец", "Повар-технолог", "Слесарь-механик"];
  const BIOLOGY = ["Мужчина, 23 года", "Женщина, 45 лет", "Мужчина, 38 лет", "Женщина, 19 лет", "Мужчина, 52 года", "Женщина, 28 лет"];
  const HEALTH = ["Идеальное здоровье", "Хроническая астма", "Слабое сердце", "Аллергия на всё", "Ранняя стадия диабета", "Абсолютно здоров"];
  const HOBBIES = ["Стрельба из лука", "Ботаника и травы", "Кулинария", "Ремонт электроники", "Прослушивание рэпа", "Карточные фокусы"];
  const PHOBIAS = ["Боязнь темноты", "Клаустрофобия", "Боязнь замкнутых пространств", "Паника при виде крови", "Страх остаться одному"];
  const BAGGAGE = ["Канистра бензина 10л", "Дробовик (3 патрона)", "Набор хирургических нитей", "Семена томатов", "Резиновая уточка", "Старый ноутбук"];

  let peer, conn, myName = "", myRole = "guest";
  let clients = []; 
  let allPlayersNames = [];
  let myDossier = {};
  let currentRound = 1;
  let disasterObj = {};

  function setScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Сеть
  const shortId = Math.floor(1000 + Math.random() * 9000).toString();
  peer = new Peer(shortId);
  peer.on('open', id => {
    document.getElementById('net-status').textContent = "Шлюз готов. Введите позывной.";
    document.getElementById('btn-create').style.display = 'block';
    document.getElementById('btn-join').style.display = 'block';
    document.getElementById('lobby-code').textContent = id;
  });

  function createRoom() {
    myName = document.getElementById('player-name').value.trim();
    if(!myName) return alert("Введите имя!");
    myRole = "host";
    allPlayersNames.push(myName);
    updateLobbyList();
    document.getElementById('btn-start-game').style.display = 'block';
    setScreen('scr-lobby');

    peer.on('connection', connection => {
      connection.on('open', () => connection.send({type: 'req-name'}));
      connection.on('data', data => {
        if(data.type === 'send-name') {
          clients.push({conn: connection, name: data.name});
          allPlayersNames.push(data.name);
          updateLobbyList();
          broadcast({type: 'sync-lobby', players: allPlayersNames});
        }
      });
    });
  }

  function joinRoom() {
    myName = document.getElementById('player-name').value.trim();
    const id = document.getElementById('room-id').value.trim();
    if(!myName || !id) return alert("Заполните поля!");
    myRole = "guest";
    document.getElementById('client-wait-msg').style.display = 'block';
    setScreen('scr-lobby');

    conn = peer.connect(id);
    conn.on('data', data => {
      if(data.type === 'req-name') conn.send({type: 'send-name', name: myName});
      if(data.type === 'sync-lobby') { allPlayersNames = data.players; updateLobbyList(); }
      if(data.type === 'start-session') {
        disasterObj = data.disaster;
        myDossier = data.dossier;
        runGameInterface();
      }
      if(data.type === 'force-next-round') {
        currentRound = data.round;
        updateDossierRender();
      }
    });
  }

  function updateLobbyList() {
    document.getElementById('player-list').innerHTML = allPlayersNames.map(p => `<li>📦 ${p}</li>`).join('');
  }

  function broadcast(data) { clients.forEach(c => c.conn.send(data)); }

  // Генерация всей сессии (Только Хост)
  function generateBunkerSession() {
    if(allPlayersNames.length < 3) return alert("Для полноценного Бункера нужно ровно 3 человека!");
    
    disasterObj = DISASTERS[Math.floor(Math.random() * DISASTERS.length)];
    
    // Генерируем досье для хоста (индекс 0)
    myDossier = generateSingleDossier();

    // Генерируем и отсылаем досье клиентам
    clients.forEach((client, i) => {
      client.conn.send({
        type: 'start-session',
        disaster: disasterObj,
        dossier: generateSingleDossier()
      });
    });

    runGameInterface();
  }

  function generateSingleDossier() {
    return {
      prof: PROFESSIONS[Math.floor(Math.random() * PROFESSIONS.length)],
      bio: BIOLOGY[Math.floor(Math.random() * BIOLOGY.length)],
      health: HEALTH[Math.floor(Math.random() * HEALTH.length)],
      hobby: HOBBIES[Math.floor(Math.random() * HOBBIES.length)],
      phobia: PHOBIAS[Math.floor(Math.random() * PHOBIAS.length)],
      bag: BAGGAGE[Math.floor(Math.random() * BAGGAGE.length)]
    };
  }

  function runGameInterface() {
    setScreen('scr-game');
    document.getElementById('bunker-disaster').textContent = disasterObj.name.toUpperCase();
    document.getElementById('bunker-desc').textContent = disasterObj.desc;
    
    if(myRole !== 'host') {
      document.getElementById('btn-action').style.display = 'none'; // Раундами управляет только хост
    }
    updateDossierRender();
  }

  function updateDossierRender() {
    const box = document.getElementById('dossier-box');
    document.getElementById('round-title').textContent = `РАУНД ${currentRound}: Из Поколения в Поколение`;

    // Рендерим строки в зависимости от текущего раунда (скрываем или открываем факты)
    box.innerHTML = `
      <div class="char-row"><span class="char-label">Профессия:</span><span class="char-val">${myDossier.prof}</span></div>
      <div class="char-row"><span class="char-label">Биология:</span><span class="char-val">${myDossier.bio}</span></div>
      
      <div class="char-row"><span class="char-label">Здоровье:</span>
        <span class="char-val ${currentRound < 2 ? 'hidden' : ''}">${currentRound >= 2 ? myDossier.health : '[ЗАБЛОКИРОВАНО]'}</span>
      </div>
      <div class="char-row"><span class="char-label">Хобби:</span>
        <span class="char-val ${currentRound < 2 ? 'hidden' : ''}">${currentRound >= 2 ? myDossier.hobby : '[ЗАБЛОКИРОВАНО]'}</span>
      </div>
      
      <div class="char-row"><span class="char-label">Фобия:</span>
        <span class="char-val ${currentRound < 3 ? 'hidden' : ''}">${currentRound >= 3 ? myDossier.phobia : '[ЗАБЛОКИРОВАНО]'}</span>
      </div>
      <div class="char-row"><span class="char-label">Багаж:</span>
        <span class="char-val ${currentRound < 3 ? 'hidden' : ''}">${currentRound >= 3 ? myDossier.bag : '[ЗАБЛОКИРОВАНО]'}</span>
      </div>
    `;

    if(myRole === 'host') {
      if(currentRound === 1) document.getElementById('btn-action').textContent = "Перейти к Раунду 2 (Здоровье и Хобби)";
      if(currentRound === 2) document.getElementById('btn-action').textContent = "Перейти к Раунду 3 (Фобии и Снаряжение)";
      if(currentRound === 3) document.getElementById('btn-action').textContent = "ФИНАЛЬНОЕ ГОЛОСОВАНИЕ НА ВЫЛЕТ";
    }
  }

  function nextRoundAction() {
    if(currentRound < 3) {
      currentRound++;
      updateDossierRender();
      broadcast({type: 'force-next-round', round: currentRound});
    } else {
      alert("Время вышло! Обсудите вживую, кто из вас троих лишний, и проголосуйте пальцем. В бункер пройдут только двое!");
    }
  }
</script>
</body>
</html>
